<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Data Siswa Sekolah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1100px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-responsive { max-height: 500px; overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginPage" class="login-box">
    <h4 class="text-center mb-3">🔒 Login Akses Data Siswa</h4>
    <p class="text-muted text-center small">Masukkan Username dan Password Guru.</p>
    <div class="mb-3">
        <input type="text" id="usernameInput" class="form-control" placeholder="Username">
    </div>
    <div class="mb-3">
        <input type="password" id="passwordInput" class="form-control" placeholder="Password">
    </div>
    <div class="d-grid">
        <button onclick="prosesLogin()" id="btnLogin" class="btn btn-primary">Masuk</button>
    </div>
    <div id="loginError" class="text-danger text-center small mt-2 hidden">Username atau Password salah!</div>
</div>

<div id="mainPage" class="container hidden">
    <h2 class="text-center mb-4">🏫 Pusat Data & Unduh Data Siswa</h2>
    
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <p class="text-muted mb-0">Selamat datang! Anda login sebagai: <strong id="namaUser">Guru</strong></p>
        <button onclick="logout()" class="btn btn-sm btn-outline-danger">Keluar / Log Out</button>
    </div>
    
    <div class="row g-3 mb-4">
        <div class="col-md-8">
            <input type="text" id="searchInput" class="form-control" placeholder="Ketik nama siswa, NISN, atau kelas untuk mencari...">
        </div>
        
        <div class="col-md-4 d-grid">
            <button onclick="downloadExcel()" class="btn btn-success">📥 Unduh Seluruh Data Siswa (Excel)</button>
        </div>
    </div>

    <div class="table-responsive border rounded">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark" id="tableHeader"></thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="100%" class="text-center text-muted">Sedang memuat data siswa...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ PENGATURAN KEDUA SPREADSHEET ANDA
    // 1. Masukkan ID File Spreadsheet khusus ACCOUNTS/LOGIN (File B)
    const ID_SPREADSHEET_AKUN = '1KzgR4tDaHAqDxp6UxZsdmxA008miD_gAhbNs_0f96k4';
    const NAMA_SHEET_AKUN = 'login_gr'; // Ganti jika nama halaman akunnya berbeda

    // 2. Masukkan ID File Spreadsheet khusus DATA SISWA (File A)
    const ID_SPREADSHEET_SISWA = '1uMnHxphMelKwM2iFMa30LDHHbKhPPGryxgKOA6UuGYM';
    const NAMA_SHEET_SISWA = 'database_siswa'; // Ganti jika nama halaman data siswanya berbeda

    let globalDataSiswa = [];

    function prosesLogin() {
        const userInput = document.getElementById('usernameInput').value.trim().toLowerCase();
        const passInput = document.getElementById('passwordInput').value.trim();
        const btn = document.getElementById('btnLogin');
        
        if(!userInput || !passInput) return alert('Isi semua kolom!');
        
        btn.innerText = "Memeriksa...";
        btn.disabled = true;

        // Tarik data dari File B (Akun)
        const urlUser = `https://docs.google.com/spreadsheets/d/${ID_SPREADSHEET_AKUN}/gviz/tq?tqx=out:json&sheet=${NAMA_SHEET_AKUN}`;
        
        fetch(urlUser)
            .then(res => res.text())
            .then(data => {
                const temp = data.substr(47).slice(0, -2);
                const json = JSON.parse(temp);
                const rows = json.table.rows;
                
                let loginSukses = false;
                for (let row of rows) {
                    const u = row.c[0] ? String(row.c[0].v).toLowerCase().trim() : ''; // Kolom A
                    const p = row.c[1] ? String(row.c[1].v).trim() : '';              // Kolom B
                    
                    if (userInput === u && passInput === p) {
                        loginSukses = true;
                        break;
                    }
                }

                if (loginSukses) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainPage').classList.remove('hidden');
                    document.getElementById('namaUser').innerText = userInput;
                    ambilDataSiswa(); // Baru panggil File A (Data Siswa) setelah sukses login
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                    btn.innerText = "Masuk";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert('Gagal sistem login. Periksa ID Spreadsheet Akun Anda.');
                btn.innerText = "Masuk";
                btn.disabled = false;
            });
    }

    function ambilDataSiswa() {
        // Tarik data dari File A (Data Siswa)
        const urlData = `https://docs.google.com/spreadsheets/d/${ID_SPREADSHEET_SISWA}/gviz/tq?tqx=out:json&sheet=${NAMA_SHEET_SISWA}`;
        
        fetch(urlData)
            .then(res => res.text())
            .then(data => {
                const temp = data.substr(47).slice(0, -2);
                const json = JSON.parse(temp);
                const rows = json.table.rows;
                const cols = json.table.cols;

                // Bikin Header Tabel otomatis
                let headerHtml = '<tr>';
                cols.forEach(col => { headerHtml += `<th>${col.label || ''}</th>`; });
                headerHtml += '</tr>';
                document.getElementById('tableHeader').innerHTML = headerHtml;

                // Ambil semua isi baris data siswa
                globalDataSiswa = rows.map(row => {
                    return row.c.map(cell => cell ? (cell.f || cell.v) : '');
                });
                tampilkanData(globalDataSiswa);
            })
            .catch(err => {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="100%" class="text-center text-danger">Gagal memuat data siswa. Cek pengaturan share File Data Siswa Anda.</td></tr>`;
            });
    }

    function tampilkanData(data) {
        let bodyHtml = '';
        data.forEach(row => {
            bodyHtml += '<tr>';
            row.forEach(cell => { bodyHtml += `<td>${cell}</td>`; });
            bodyHtml += '</tr>';
        });
        document.getElementById('tableBody').innerHTML = bodyHtml || '<tr><td colspan="100%" class="text-center">Data tidak ditemukan.</td></tr>';
    }

    // Fungsi Pencarian Live
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase();
        const filteredData = globalDataSiswa.filter(row => {
            return row.some(cell => String(cell).toLowerCase().includes(keyword));
        });
        tampilkanData(filteredData);
    });

    // Fungsi Download Excel
    function downloadExcel() {
        if(globalDataSiswa.length === 0) return alert('Data belum siap atau masih kosong!');
        const headers = Array.from(document.querySelectorAll("#tableHeader th")).map(th => th.innerText);
        const dataToDownload = [headers, ...globalDataSiswa];
        const worksheet = XLSX.utils.aoa_to_sheet(dataToDownload);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Data Siswa");
        XLSX.writeFile(workbook, `Data_Siswa_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function logout() {
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('loginError').classList.add('hidden');
        document.getElementById('btnLogin').innerText = "Masuk";
        document.getElementById('btnLogin').disabled = false;
        globalDataSiswa = [];
    }
</script>
</body>
</html>
