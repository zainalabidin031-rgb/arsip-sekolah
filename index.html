<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Sekolah - Data Dapodik</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .sub { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        .filter-box { display: flex; gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        select { flex: 1; }
        input { flex: 2; }
        button { background: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #2980b9; }
        .btn-excel { background: #27ae60; margin-left: auto; display: block; margin-bottom: 15px; }
        .btn-excel:hover { background: #219653; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #2c3e50; position: sticky; top: 0; }
        #loading { text-align: center; font-weight: bold; color: #e67e22; display: none; padding: 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="container">
    <h2>📂 Portal Arsip Sekolah</h2>
    <p class="sub">Data Real-Time langsung dari Web Service Dapodik Sekolah</p>

    <div class="filter-box">
        <button onclick="tarikDataDapodik()">🔄 Tarik Data Terbaru</button>
        <input type="text" id="cariNama" onkeyup="filterNama()" placeholder="Ketik nama siswa untuk menyaring...">
    </div>

    <div id="loading">⏳ Sedang mengambil data langsung dari laptop Dapodik...</div>

    <button class="btn-excel" onclick="unduhExcel()">📊 Unduh Format Excel</button>

    <table id="tabelSiswa">
        <thead>
            <tr>
                <th>No</th>
                <th>Nama Siswa</th>
                <th>L/P</th>
                <th>NISN</th>
                <th>Tempat Lahir</th>
                <th>Tanggal Lahir</th>
                <th>Nama Ibu Kandung</th>
            </tr>
        </thead>
        <tbody id="badanTabel">
            <tr><td colspan="7" style="text-align:center; color:#999;">Silahkan klik tombol "Tarik Data Terbaru" di atas.</td></tr>
        </tbody>
    </table>
</div>

<script>
let dataSiswaMaster = []; // Tempat menyimpan data mentah dari Dapodik

function tarikDataDapodik() {
    let loading = document.getElementById("loading");
    loading.style.display = "block";
    
    // Memanggil file PHP perantara yang tadi kita buat
    fetch('ambil_data.php')
    .then(response => response.json())
    .then(data => {
        loading.style.display = "none";
        // Dapodik biasanya membungkus datanya di dalam properti "rows"
        dataSiswaMaster = data.rows || data; 
        tampilkanTabel(dataSiswaMaster);
    })
    .catch(error => {
        loading.style.display = "none";
        alert("Gagal konek ke laptop Dapodik! Pastikan laptop Dapodik menyala dan Wi-Fi sama.");
        console.error(error);
    });
}

function tampilkanTabel(data) {
    let badanTabel = document.getElementById("badanTabel");
    badanTabel.innerHTML = "";
    
    if(data.length === 0) {
        badanTabel.innerHTML = `<tr><td colspan="7" style="text-align:center;">Data Kosong</td></tr>`;
        return;
    }

    data.forEach((siswa, index) => {
        let row = document.createElement("tr");
        row.className = "baris-siswa";
        row.innerHTML = `
            <td>${index + 1}</td>
            <td class="nama-siswa"><b>${siswa.nama}</b></td>
            <td>${siswa.jenis_kelamin}</td>
            <td>${siswa.nisn || '-'}</td>
            <td>${siswa.tempat_lahir}</td>
            <td>${siswa.tanggal_lahir}</td>
            <td>${siswa.nama_ibu_kandung || '-'}</td>
        `;
        badanTabel.appendChild(row);
    });
}

function filterNama() {
    let kataKunci = document.getElementById("cariNama").value.toLowerCase().trim();
    let baris = document.getElementsByClassName("baris-siswa");
    
    for (let i = 0; i < baris.length; i++) {
        let nama = baris[i].getElementsByClassName("nama-siswa")[0].innerText.toLowerCase();
        baris[i].style.display = nama.includes(kataKunci) ? "" : "none";
    }
}

function unduhExcel() {
    if(dataSiswaMaster.length === 0) {
        alert("Belum ada data yang ditarik! Klik Tarik Data dulu.");
        return;
    }
    // Proses mengubah tabel HTML menjadi file Excel .xlsx otomatis
    let tabel = document.getElementById("tabelSiswa");
    let fileExcel = XLSX.utils.table_to_book(tabel, {sheet: "Data Siswa Dapodik"});
    XLSX.writeFile(fileExcel, "Arsip_Siswa_Dapodik.xlsx");
}
</script>
</body>
</html>
