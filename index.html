<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDN Butoh 1 Ngasem - Kab. Bojonegoro</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* RESET & GENERAL STYLES */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f6ff; /* Latar belakang abu kebiruan segar */
            color: #2d3748;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- TOP BAR DESKTOP --- */
        .topbar {
            background-color: #0056cc; /* Biru gelap pengimbang */
            color: white;
            font-size: 11px;
            padding: 8px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .topbar .flex-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar a {
            color: #00c6ff;
            font-weight: 700;
        }

        /* --- STICKY NAVBAR --- */
        .navbar {
            background-color: #ffffff;
            padding: 15px 0;
            box-shadow: 0 4px 15px rgba(0, 140, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e6f2ff;
        }
        .navbar .flex-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #0077ff; /* Biru Cerah */
            line-height: 1;
        }
        .nav-logo p {
            font-size: 11px;
            color: #718096;
            margin-top: 3px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 10px;
            align-items: center;
        }

        .nav-links a, .nav-links .dropbtn {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-links a:hover, .nav-links a.active, .nav-links .dropbtn:hover {
            color: #0077ff;
            background-color: #e6f2ff;
        }

        /* DROPDOWN SYSTEM */
        .dropdown { position: relative; }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #ffffff;
            min-width: 180px;
            box-shadow: 0px 8px 24px rgba(0, 140, 255, 0.15);
            border-radius: 8px;
            padding: 6px 0;
            margin-top: 8px;
            z-index: 999;
            border: 1px solid #e6f2ff;
        }
        .dropdown-content a {
            color: #4a5568 !important;
            padding: 10px 16px !important;
            display: block;
            font-size: 13px !important;
            font-weight: 500 !important;
            text-align: left;
            border-radius: 0 !important;
        }
        .dropdown-content a:hover {
            background-color: #e6f2ff !important;
            color: #0077ff !important;
        }
        .show-dropdown { display: block !important; }

        /* --- HERO BANNER CAROUSEL --- */
        .hero-section {
            background-color: #ffffff;
            padding: 25px 0;
        }
        .carousel-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,114,255, 0.08);
            aspect-ratio: 21/9;
            background-color: #1a202c;
        }
        .slide { display: none; width: 100%; height: 100%; position: relative; }
        .slide.active { display: block; animation: fadeIn 0.8s ease-in-out; }
        
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .slide-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.2) 60%, transparent 100%);
        }
        .slide-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px;
            color: white;
            z-index: 10;
        }
        .slide-badge {
            background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%);
            color: white;
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .slide-caption h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 800;
            line-height: 1.3;
            max-width: 850px;
        }

        /* --- DATA METRIK SEKOLAH --- */
        .metric-section { padding: 15px 0; }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: #ffffff;
            padding: 25px;
            border-radius: 14px;
            border: 1px solid #e2eefe;
            box-shadow: 0 4px 20px rgba(0, 114, 255, 0.02);
            text-align: center;
        }
        .metric-item { 
            border-right: 1px solid #e6f2ff; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .metric-item:last-child { border: none; }
        .metric-label { font-size: 11px; font-weight: 700; color: #8da2bb; text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 19px; font-weight: 800; color: #0072ff; margin-top: 5px; }
        .metric-icon-inline { display: none; } /* Hanya muncul di HP */

        /* --- LAYOUT KONTEN BERITA --- */
        .main-content { padding: 40px 0 60px 0; }
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e6f2ff;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .content-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .content-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(#0072ff, #00c6ff);
            border-radius: 2px;
            display: inline-block;
        }
        .view-all { font-size: 13px; font-weight: 700; color: #0072ff; }
        .view-all:hover { text-decoration: underline; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .news-card {
            background: #ffffff;
            border-radius: 14px;
            border: 1px solid #e2eefe;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
            transition: all 0.3s;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 114, 255, 0.08);
            border-color: #b3d7ff;
        }
        .news-thumb { width: 100%; height: 180px; background-color: #e6f2ff; overflow: hidden; }
        .news-thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .news-body { padding: 20px; }
        .news-tag {
            font-size: 10px;
            font-weight: 700;
            background-color: #e6f2ff;
            color: #0072ff;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .news-card h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
