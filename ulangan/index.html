<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ulangan Online SD</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Fredoka', sans-serif; }
  </style>
</head>
<body class="bg-blue-50 text-slate-700 min-h-screen flex flex-col justify-between">

  <header class="bg-blue-500 text-white p-4 shadow-md text-center">
    <h1 class="text-2xl font-bold tracking-wide">🌤️ Yuk, Kita Ulangan! 🌤️</h1>
  </header>

  <main class="container mx-auto px-4 py-6 max-w-xl flex-grow">
    
    <div id="halaman-login" class="bg-white rounded-2xl p-6 shadow-xl border-4 border-blue-300">
      <h2 class="text-xl font-bold text-blue-600 mb-4 text-center">Isi Data Dirimu Dulu Ya!</h2>
      <div class="space-y-4">
        <div>
          <label class="block font-semibold mb-1">Nama Lengkap:</label>
          <input type="text" id="nama" class="w-full border-2 border-blue-200 rounded-xl p-2 focus:outline-none focus:border-blue-500" placeholder="Contoh: Andi Pratama">
        </div>
        <div>
          <label class="block font-semibold mb-1">NISN:</label>
          <input type="number" id="nisn" class="w-full border-2 border-blue-200 rounded-xl p-2 focus:outline-none focus:border-blue-500" placeholder="Contoh: 0123456789">
        </div>
        <div>
          <label class="block font-semibold mb-1">Kelas:</label>
          <select id="kelas" class="w-full border-2 border-blue-200 rounded-xl p-2 focus:outline-none focus:border-blue-500">
            <option value="1">Kelas 1</option>
            <option value="2">Kelas 2</option>
            <option value="3">Kelas 3</option>
            <option value="4">Kelas 4</option>
            <option value="5">Kelas 5</option>
            <option value="6">Kelas 6</option>
          </select>
        </div>
        <div>
          <label class="block font-semibold mb-1">Mata Pelajaran:</label>
          <input type="text" id="mapel" class="w-full border-2 border-blue-200 rounded-xl p-2 focus:outline-none focus:border-blue-500" placeholder="Contoh: Matematika / IPA">
        </div>
        <button onclick="mulaiUlangan()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-800 font-bold py-3 rounded-xl shadow-md transition duration-200 text-lg mt-2">
          🚀 Mulai Sekarang!
        </button>
      </div>
    </div>

    <div id="halaman-soal" class="hidden bg-white rounded-2xl p-6 shadow-xl border-4 border-blue-300">
      <div class="flex justify-between items-center mb-4 border-b pb-2">
        <button onclick="kembaliKeLogin()" class="bg-slate-400 hover:bg-slate-500 text-white font-semibold py-1 px-3 rounded-lg text-sm">
          ⬅️ Kembali
        </button>
        <span class="text-blue-600 font-bold" id="info-siswa"></span>
      </div>
      
      <div id="kontainer-soal" class="space-y-6">
        </div>

      <button onclick="selesaiDanHitung()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow-md text-lg mt-6">
        Kirim Jawaban 📑
      </button>
    </div>

    <div id="halaman-hasil" class="hidden bg-white rounded-2xl p-6 shadow-xl border-4 border-blue-300 text-center">
      <h2 class="text-2xl font-bold text-blue-600 mb-2">Hasil Ulanganku</h2>
      <p class="text-slate-500 mb-6" id="hasil-detail"></p>
      
      <div class="inline-block bg-blue-100 rounded-full p-8 mb-6 border-4 border-blue-400">
        <span class="text-5xl font-bold text-blue-600" id="skor-akhir">0</span>
      </div>

      <div id="pesan-kelulusan" class="text-lg font-semibold mb-6"></div>

      <div class="space-y-3">
        <button id="btn-ulangi" onclick="ulangiUjian()" class="hidden w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 rounded-xl shadow-md">
          🔄 Coba Lagi (Nilai di bawah 80)
        </button>
        <button onclick="kembaliKeLogin()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md">
          🏠 Halaman Utama
        </button>
      </div>
    </div>

  </main>

  <footer class="bg-blue-400 text-white text-center py-2 text-xs">
    Semangat Belajar! Jangan Lupa Berdoa Sebelum Mengerjakan 🌟
  </footer>

  <script>
    let dataSoalGlobal = [];
    let identitasSiswa = {};

    function mulaiUlangan() {
      const nama = document.getElementById('nama').value;
      const nisn = document.getElementById('nisn').value;
      const kelas = document.getElementById('kelas').value;
      const mapel = document.getElementById('mapel').value;

      if(!nama || !nisn || !mapel) {
        alert('Halo! Isi nama, NISN, dan mata pelajaran dulu yaa 😊');
        return;
      }

      identitasSiswa = { nama, nisn, kelas, mataPelajaran: mapel };
      document.getElementById('info-siswa').innerText = `${nama} (Kelas ${kelas})`;

      // Ambil soal dari Google Sheet secara asinkron
      document.getElementById('kontainer-soal').innerHTML = '<p class="text-center font-semibold text-blue-500 animate-pulse">Sedang menyiapkan soal yang seru... Tunggu ya! 📝</p>';
      pindahHalaman('halaman-soal');

      google.script.run.withSuccessHandler(function(soal) {
        if(soal.length === 0) {
          document.getElementById('kontainer-soal').innerHTML = '<p class="text-center text-red-500 font-semibold">Ups, soal untuk kelas atau mata pelajaran ini belum tersedia. Periksa kembali ya!</p>';
          return;
        }
        dataSoalGlobal = soal;
        tampilkanSoal(soal);
      }).getSoal(kelas, mapel);
    }

    function tampilkanSoal(soalList) {
      let html = '';
      soalList.forEach((s, index) => {
        html += `
          <div class="border-b pb-4">
            <p class="font-semibold text-base mb-2"><span class="bg-blue-400 text-white px-2 py-0.5 rounded-md mr-1">${index + 1}</span> ${s.soal}</p>
            <div class="grid grid-cols-1 gap-2 pl-2">
              ${s.opsi.map((opsi, idx) => {
                let opsiHuruf = String.fromCharCode(97 + idx); // a, b, c, d
                return `
                  <label class="flex items-center space-x-2 bg-slate-50 p-2.5 rounded-lg border hover:bg-blue-50 cursor-pointer transition">
                    <input type="radio" name="soal_${s.id}" value="${opsiHuruf}" class="w-4 h-4 text-blue-600">
                    <span><strong class="uppercase">${opsiHuruf}.</strong> ${opsi}</span>
                  </label>
                `;
              }).join('')}
            </div>
          </div>
        `;
      });
      document.getElementById('kontainer-soal').innerHTML = html;
    }

    function selesaiDanHitung() {
      let benar = 0;
      let totalSoal = dataSoalGlobal.length;

      dataSoalGlobal.forEach(s => {
        let pilihan = document.querySelector(`input[name="soal_${s.id}"]:checked`);
        if(pilihan && pilihan.value === s.kunci) {
          benar++;
        }
      });

      let nilaiAkhir = Math.round((benar / totalSoal) * 100);
      identitasSiswa.nilai = nilaiAkhir;

      // Kirim dan rekam hasil ke sheet 'nilai'
      google.script.run.simpanNilai(identitasSiswa);

      // Tampilkan halaman nilai
      document.getElementById('skor-akhir').innerText = nilaiAkhir;
      document.getElementById('hasil-detail').innerText = `${identitasSiswa.nama} - ${identitasSiswa.mataPelajaran}`;
      
      let pesanBox = document.getElementById('pesan-kelulusan');
      let btnUlangi = document.getElementById('btn-ulangi');

      if(nilaiAkhir >= 80) {
        pesanBox.innerHTML = '🎉 Hebat sekali! Kamu lulus dengan nilai bagus! 👍🌟';
        pesanBox.className = "text-green-600 font-bold text-lg mb-6";
        btnUlangi.classList.add('hidden');
      } else {
        pesanBox.innerHTML = '💪 Jangan berkecil hati ya, ayo coba lagi agar nilaimu makin bagus!';
        pesanBox.className = "text-orange-500 font-bold text-lg mb-6";
        btnUlangi.classList.remove('hidden');
      }

      pindahHalaman('halaman-hasil');
    }

    function ulangiUjian() {
      pindahHalaman('halaman-soal');
      // Reset semua pilihan radio button
      let radioButtons = document.querySelectorAll('input[type="radio"]');
      radioButtons.forEach(radio => radio.checked = false);
    }

    function kembaliKeLogin() {
      pindahHalaman('halaman-login');
    }

    function pindahHalaman(idHalaman) {
      document.getElementById('halaman-login').classList.add('hidden');
      document.getElementById('halaman-soal').classList.add('hidden');
      document.getElementById('halaman-hasil').classList.add('hidden');
      document.getElementById(idHalaman).classList.remove('hidden');
    }
  </script>
</body>
</html>
