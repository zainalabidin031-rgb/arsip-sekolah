<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
font-family:Arial,sans-serif;
background:#eaf7ff;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.15);
}

h2{
color:#008cff;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#00a2ff;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0084d1;
}

.opsi{
padding:12px;
margin:10px 0;
background:#f3f9ff;
border:1px solid #cbe7ff;
border-radius:10px;
cursor:pointer;
}

.opsi:hover{
background:#dff2ff;
}

#quiz,#hasil{
display:none;
}

img{
max-width:100%;
margin:10px 0;
border-radius:10px;
}

.progress{
font-weight:bold;
color:#008cff;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div id="login">

<h2>ULANGAN ONLINE</h2>

<input id="nisn" placeholder="NISN">

<input id="nama" placeholder="Nama Lengkap">

<input id="token" placeholder="Token Ulangan">

<button onclick="mulai()">Mulai Ulangan</button>

<button onclick="history.back()">Kembali</button>

</div>

<div id="quiz">

<div class="progress" id="progress"></div>

<div id="soal"></div>

<div id="gambar"></div>

<div id="opsi"></div>

</div>

<div id="hasil">

<h2>Hasil Ulangan</h2>

<h1 id="nilai"></h1>

<button id="ulangBtn" onclick="ulangi()">
Ulangi Ulangan
</button>

<button onclick="location.reload()">
Selesai
</button>

</div>

</div>

<script>

let dataSoal=[];
let nomor=0;
let benar=0;

let kelas="";
let mapel="";

function mulai(){

let token=document.getElementById("token").value;

google.script.run
.withSuccessHandler(function(res){

kelas=res.kelas;
mapel=res.mapel;

dataSoal=res.soal;

document.getElementById("login").style.display="none";
document.getElementById("quiz").style.display="block";

tampilSoal();

})
.ambilSoal(token);

}

function tampilSoal(){

let s=dataSoal[nomor];

document.getElementById("progress").innerHTML=
"Soal "+(nomor+1)+" dari "+dataSoal.length;

document.getElementById("soal").innerHTML=
"<h3>"+s.soal+"</h3>";

if(s.gambar){

document.getElementById("gambar").innerHTML=
"<img src='"+s.gambar+"'>";

}else{

document.getElementById("gambar").innerHTML="";
}

let html="";

["a","b","c","d"].forEach(function(k){

html+=`
<div class="opsi"
onclick="jawab('${k}')">
${s[k]}
</div>
`;

});

document.getElementById("opsi").innerHTML=html;

}

function jawab(pilih){

if(
pilih.toUpperCase() ==
dataSoal[nomor].jawaban.toUpperCase()
){
benar++;
}

nomor++;

if(nomor<dataSoal.length){

tampilSoal();

}else{

selesai();

}

}

function selesai(){

let nilai=
Math.round(
(benar/dataSoal.length)*100
);

document.getElementById("quiz").style.display="none";
document.getElementById("hasil").style.display="block";

document.getElementById("nilai").innerHTML=
nilai;

if(nilai>=80){
document.getElementById("ulangBtn").style.display="none";
}

google.script.run.simpanNilai({

nisn:
document.getElementById("nisn").value,

nama:
document.getElementById("nama").value,

kelas:kelas,

mapel:mapel,

nilai:nilai

});

}

function ulangi(){

nomor=0;
benar=0;

document.getElementById("hasil").style.display="none";
document.getElementById("quiz").style.display="block";

tampilSoal();

}

</script>

</body>
</html>
