<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6 text-slate-800">

  <div class="w-full max-w-2xl bg-white rounded-xl shadow-md border border-blue-100 overflow-hidden">
    
    <div class="bg-blue-600 px-6 py-4 text-white font-semibold text-lg tracking-wide flex items-center relative">
      <button id="btnKembali" onclick="aksiKembali()" class="absolute left-4 bg-blue-700 hover:bg-blue-800 text-xs font-medium px-3 py-1.5 rounded transition">← Kembali</button>
      <div class="w-full text-center">Portal Ujian & Ulangan Harian</div>
    </div>

    <div class="p-8 space-y-6">
      
      <div class="border-l-4 border-blue-500 bg-blue-50 p-4 rounded-r-lg text-blue-900 text-sm leading-relaxed">
        Halo! Silakan lengkapi data diri Anda, kemudian pilih <strong>Kelas</strong>, <strong>Mata Pelajaran</strong>, dan <strong>Bab/Materi</strong> yang ingin Anda kerjakan hari ini.
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-b pb-6 border-slate-100">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Nama Lengkap</label>
          <input type="text" id="namaSiswa" class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase font-medium" placeholder="Contoh: BUDI SETIAWAN">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">NISN Siswa</label>
          <input type="text" id="nisnSiswa" class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="10 Digit Nomor NISN">
        </div>
      </div>

      <div class="space-y-4">
        
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Pilih Tingkat Kelas</label>
          <select id="pilihKelas" onchange="updateMapel()" class="w-full border border-slate-300 bg-white rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
            <option value="">-- Pilih Kelas --</option>
            <option value="4">Kelas 4 SD</option>
            <option value="5">Kelas 5 SD</option>
            <option value="6">Kelas 6 SD</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Pilih Mata Pelajaran</label>
          <select id="pilihMapel" onchange="updateBab()" disabled class="w-full border border-slate-300 bg-white rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer disabled:bg-slate-100 disabled:cursor-not-allowed">
            <option value="">-- Pilih Mata Pelajaran --</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Pilih Bab / Materi Pembelajaran</label>
          <select id="pilihBab" disabled class="w-full border border-slate-300 bg-white rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer disabled:bg-slate-100 disabled:cursor-not-allowed">
            <option value="">-- Pilih Bab / Materi --</option>
          </select>
        </div>

      </div>

      <div class="pt-2">
        <button onclick="mulaiUjian()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3.5 rounded-lg shadow-sm transition duration-150 active:scale-[0.99] cursor-pointer text-sm text-center">
          🚀 Masuk ke Lembar Ulangan
        </button>
      </div>

    </div>

  </div>

  <script>
    // Contoh Data Master Kurikulum (Ini bisa kamu sesuaikan/singkronkan nantinya)
    const dataKurikulum = {
      "4": {
        "Matematika": ["Pecahan Senilai", "KPK dan FPB", "Bangun Datar"],
        "IPAS": ["Bagian Tubuh Tumbuhan", "Wujud Zat dan Perubahannya"]
      },
      "5": {
        "Matematika": ["Penjumlahan Pecahan", "Kecepatan dan Debit", "Skala Denah"],
        "IPAS": ["Melihat karena Cahaya", "Harmoni dalam Ekosistem", "Organ Tubuh Manusia"],
        "Bahasa Indonesia": ["Unsur Intrinsik Cerita", "Surat Resmi dan Pribadi"]
      },
      "6": {
        "Matematika": ["Bilangan Bulat Negatif", "Lingkaran", "Bangun Ruang"],
        "IPAS": ["Selamatkan Makhluk Hidup", "Persatuan dalam Perbedaan"]
      }
    };

    // Fungsi dijalankan saat Kelas dipilih
    function updateMapel() {
      const kelas = document.getElementById("pilihKelas").value;
      const mapelSelect = document.getElementById("pilihMapel");
      const babSelect = document.getElementById("pilihBab");

      // Reset dropdown Mapel dan Bab
      mapelSelect.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
      babSelect.innerHTML = '<option value="">-- Pilih Bab / Materi --</option>';
      babSelect.disabled = true;

      if (kelas && dataKurikulum[kelas]) {
        mapelSelect.disabled = false;
        Object.keys(dataKurikulum[kelas]).forEach(mapel => {
          let opt = document.createElement("option");
          opt.value = mapel;
          opt.innerText = mapel;
          mapelSelect.appendChild(opt);
        });
      } else {
        mapelSelect.disabled = true;
      }
    }

    // Fungsi dijalankan saat Mapel dipilih
    function updateBab() {
      const kelas = document.getElementById("pilihKelas").value;
      const mapel = document.getElementById("pilihMapel").value;
      const babSelect = document.getElementById("pilihBab");

      // Reset dropdown Bab
      babSelect.innerHTML = '<option value="">-- Pilih Bab / Materi --</option>';

      if (kelas && mapel && dataKurikulum[kelas][mapel]) {
        babSelect.disabled = false;
        dataKurikulum[kelas][mapel].forEach(bab => {
          let opt = document.createElement("option");
          opt.value = bab;
          opt.innerText = bab;
          babSelect.appendChild(opt);
        });
      } else {
        babSelect.disabled = true;
      }
    }

    // Fungsi Validasi & Submit saat tombol Mulai diklik
    function mulaiUjian() {
      const nama = document.getElementById("namaSiswa").value.trim();
      const nisn = document.getElementById("nisnSiswa").value.trim();
      const kelas = document.getElementById("pilihKelas").value;
      const mapel = document.getElementById("pilihMapel").value;
      const bab = document.getElementById("pilihBab").value;

      if (!nama) { alert("Nama Lengkap wajib diisi!"); return; }
      if (!kelas || !mapel || !bab) { alert("Silakan lengkapi pilihan Kelas, Mapel, dan Bab terlebih dahulu!"); return; }

      // Logika integrasi ke sistem pengerjaan soal
      alert(`Berhasil Terdaftar!\nNama: ${nama}\nKelas: ${kelas}\nMapel: ${mapel}\nBab: ${bab}\n\nSistem akan mengarahkan ke lembar soal...`);
      
      // Catatan: Di sini kamu bisa mengoper data ini ke fungsi lembar soal yang sudah kamu buat sebelumnya menggunakan google.script.run
    }

    // Fungsi tombol kembali
    function aksiKembali() {
      // Logika jika ingin kembali ke halaman utama website kamu
      window.history.back();
    }
  </script>
</body>
</html>
