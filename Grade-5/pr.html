<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Tugas & PR - Kelas 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #EBF3F9; color: #2D3748; padding: 20px 10px; }
        .wrapper { max-width: 600px; margin: 0 auto; background: #FFF; border-radius: 16px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; color: #0D47A1; font-weight: 800; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #E2E8F0; padding-bottom: 10px; }
        .card { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .mapel { font-size: 1.1rem; font-weight: 800; color: #311B92; }
        .tenggat { font-size: 0.8rem; color: #E65100; font-weight: 700; margin-bottom: 8px; }
        .detail { font-size: 0.95rem; color: #334155; margin-bottom: 12px; }
        .btn-online { display: inline-flex; align-items: center; justify-content: center; background: #00B0FF; color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; transition: 0.2s; width: 100%; text-align: center; }
        .btn-online:hover { background: #0D47A1; }
        .loading { text-align: center; color: #718096; font-size: 0.9rem; padding: 20px; }
        .btn-kembali { display: block; text-align: center; text-decoration: none; background: #EDF2F7; color: #4A5568; padding: 10px; border-radius: 30px; font-weight: 700; font-size: 0.85rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>📋 Daftar Tugas & PR Siswa</h1>
        <div id="konten-pr"><div class="loading">Memuat data tugas...</div></div>
        <a href="index.html" class="btn-kembali"> Kembali ke Utama</a>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT KAMU DI SINI
        const urlAPI = "https://script.google.com/macros/s/AKfycbyOQA-L4BNcUaGj9LG2y-gOIKQUyp_sRHkggvvCdJtvwMgLQuZaXrZALfNAaBxn5RN11w/exec";

        async function ambilData() {
            try {
                const respon = await fetch(urlAPI);
                const data = await respon.json();
                const listPR = data.pr;
                let html = "";

                // Filter hanya yang berstatus Aktif
                const prAktif = listPR.filter(item => item.Status === "Aktif");

                if(prAktif.length === 0) {
                    html = "<div class='loading'>🎉 Hore! Tidak ada PR aktif saat ini.</div>";
                } else {
                    prAktif.forEach(item => {
                        html += `
                            <div class="card">
                                <div class="mapel">${item.Mapel}</div>
                                <div class="tenggat">⏳ Batas: ${item.Tenggat}</div>
                                <div class="detail">${item.Detail}</div>
                        `;
                        // Cek jika kolom Link_Online ada holds isian teks data
                        if(item.Link_Online && item.Link_Online.trim() !== "") {
                            html += `<a href="${item.Link_Online}" class="btn-online">📝 Mulai Kerjakan Online</a>`;
                        }
                        html += `</div>`;
                    });
                }
                document.getElementById("konten-pr").innerHTML = html;
            } catch (error) {
                document.getElementById("konten-pr").innerHTML = "<div class='loading' style='color:red;'>Gagal memuat data. Periksa koneksi internet.</div>";
            }
        }
        ambilData();
    </script>
</body>
</html>
