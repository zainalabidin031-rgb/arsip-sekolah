<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Izin Siswa - SDN Butoh 1</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --biru-matang: #0D47A1;
            --biru-muda: #EBF3F9;
            --putih: #FFFFFF;
            --teks-utama: #2D3748;
            --border-color: #CBD5E1;
            --hijau-wa: #25D366;
            --hijau-wa-hover: #128C7E;
        }

        body {
            background-color: var(--biru-muda);
            color: var(--teks-utama);
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-wrapper {
            width: 100%;
            max-width: 500px;
            background: var(--putih);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 25px 20px;
        }

        /* --- HEADER FORMULIR --- */
        .form-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #E2E8F0;
            padding-bottom: 15px;
        }

        .form-header h2 {
            font-size: 1.4rem;
            color: var(--biru-matang);
            font-weight: 800;
            margin-bottom: 5px;
        }

        .form-header p {
            font-size: 0.85rem;
            color: #718096;
            font-weight: 500;
        }

        /* --- GRUP INPUT --- */
        .input-grup {
            margin-bottom: 20px;
        }

        .input-grup label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #334155;
        }

        .input-grup input[type="date"],
        .input-grup select {
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #F8FAFC;
            color: var(--teks-utama);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-grup input[type="date"]:focus,
        .input-grup select:focus {
            border-color: var(--biru-matang);
            background-color: var(--putih);
            box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.15);
        }

        /* --- TOMBOL AKSI --- */
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-kirim {
            background-color: var(--hijau-wa);
            color: var(--putih);
        }

        .btn-kirim:hover {
            background-color: var(--hijau-wa-hover);
        }

        .btn-kembali {
            background-color: #EDF2F7;
            color: #4A5568;
        }

        .btn-kembali:hover {
            background-color: #E2E8F0;
        }
    </style>
</head>
<body>

    <div class="form-wrapper">
        
        <div class="form-header">
            <h2>Surat Izin Digital</h2>
            <p>Formulir Ketidakhadiran Siswa Kelas 5 SD</p>
        </div>

        <form onsubmit="kirimWA(event)">
            
            <div class="input-grup">
                <label for="tanggal">Pilih Tanggal Izin</label>
                <input type="date" id="tanggal" required>
            </div>

            <div class="input-grup">
                <label for="nama_anak">Nama Anak / Siswa</label>
                <select id="nama_anak" required>
                    <option value="" disabled selected>-- Pilih Nama Siswa --</option>
                    <option value="Achmat Juli Setyawan">Achmat Juli Setyawan</option>
                    <option value="Afifa Refanda Oktavia">Afifa Refanda Oktavia</option>
                    <option value="Ahmad Noval Nugroho">Ahmad Noval Nugroho</option>
                    <option value="Ahmad Syahrul Dermawan">Ahmad Syahrul Dermawan</option>
                    <option value="Farel Galih Revander">Farel Galih Revander</option>
                    <option value="Mochammad Noer Azzam">Mochammad Noer Azzam</option>
                    <option value="Muhamad Adi nur Mahendra">Muhamad Adi nur Mahendra</option>
                    <option value="MUHAMMAD ALFIAN HIDAYATULLOH">MUHAMMAD ALFIAN HIDAYATULLOH</option>
                    <option value="Muhammad David Aufal Marom">Muhammad David Aufal Marom</option>
                    <option value="MUHAMMAD FAJAR IBRAHIM">MUHAMMAD FAJAR IBRAHIM</option>
                    <option value="Natasya Syabila Azzahra">Natasya Syabila Azzahra</option>
                    <option value="Ramadhani Rizki Hermawan">Ramadhani Rizki Hermawan</option>
                    <option value="Rosalina Ayu Kirana Putri">Rosalina Ayu Kirana Putri</option>
                    <option value="Tri Nurdiana">Tri Nurdiana</option>
                    <option value="Tri Nurdiani">Tri Nurdiani</option>
                    <option value="Yuda Setya Anggara Putra">Yuda Setya Anggara Putra</option>
                </select>
            </div>

            <div class="input-grup">
                <label for="keterangan">Keterangan Izin</label>
                <select id="keterangan" required>
                    <option value="" disabled selected>-- Pilih Alasan Izin --</option>
                    <option value="Sakit">Sakit</option>
                    <option value="Membantu Orangtua">Membantu Orangtua</option>
                    <option value="Bepergian">Bepergian</option>
                    <option value="Kesiangan">Kesiangan</option>
                    <option value="Acara Keluarga">Acara Keluarga</option>
                </select>
            </div>

            <div class="btn-box">
                <button type="submit" class="btn btn-kirim">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.948 0c3.179.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.239 3.482 8.415-.004 6.557-5.342 11.906-11.896 11.906-2.003-.001-3.973-.508-5.729-1.474L0 24zm6.59-4.846c1.666.988 3.311 1.503 5.3 1.505 5.548 0 10.065-4.512 10.068-10.066.002-2.69-1.046-5.219-2.951-7.127C17.15 1.558 14.63 .51 11.948.508c-5.556 0-10.074 4.52-10.077 10.077-.001 1.916.495 3.535 1.446 5.174L1.93 22.016l6.417-1.683zM16.92 14.77c-.287-.143-1.696-.837-1.959-.933-.262-.096-.452-.143-.642.143-.19.286-.736.933-.903 1.123-.166.19-.332.214-.618.071-.286-.143-1.208-.445-2.3-1.42-.851-.76-1.425-1.697-1.592-1.983-.166-.285-.018-.44.125-.581.129-.127.286-.333.429-.5.143-.166.19-.285.286-.476.095-.19.047-.357-.024-.5-.071-.143-.642-1.547-.879-2.117-.231-.557-.466-.481-.642-.49-.166-.008-.357-.01-.548-.01-.19 0-.5.071-.76.357-.263.286-1.001.977-1.001 2.381 0 1.403 1.022 2.759 1.165 2.95 1.144 1.556 2.486 2.651 4.2 3.238.411.141.821.226 1.225.293.414.069.789.043 1.086-.002.332-.05 1.001-.41 1.142-.809.143-.399.143-.737.1-.809-.043-.071-.166-.114-.452-.256z"/></svg>
                    Kirim Surat Izin (WhatsApp)
                </button>
                <a href="/" class="btn btn-kembali">Kembali</a>
            </div>

        </form>

    </div>

    <script>
        // Otomatis isi tanggal hari ini saat halaman dibuka
        document.getElementById('tanggal').valueAsDate = new Date();

        function kirimWA(event) {
            event.preventDefault(); // Mencegah reload halaman
            
            // Ambil data dari input formulir
            const tanggalInput = document.getElementById('tanggal').value;
            const nama = document.getElementById('nama_anak').value;
            const keterangan = document.getElementById('keterangan').value;
            
            // Format format tanggal lokal agar lebih rapi dibaca (Contoh: 8 Juli 2026)
            const opsiTanggal = { year: 'numeric', month: 'long', day: 'numeric' };
            const tanggalFormat = new Date(tanggalInput).toLocaleDateString('id-ID', opsiTanggal);
            
            // -------------------------------------------------------------
            // PENTING: Ganti nomor di bawah ini dengan nomor WhatsApp Guru.
            // Gunakan kode negara "62" di depan, jangan gunakan angka "0".
            // Contoh: 08123456789 menjadi 628123456789
            // -------------------------------------------------------------
            const nomorWA = "6289643655518"; 
            
            // Menyusun format pesan teks WhatsApp
            const pesan = `*SURAT IZIN TIDAK MASUK SISWA*\n` +
                          `=========================\n\n` +
                          `Yth. Bapak/Ibu Guru Kelas 5 SD,\n\n` +
                          `Memberitahukan bahwa siswa berikut ini:\n` +
                          `👤 *Nama:* ${nama}\n` +
                          `📅 *Hari/Tanggal:* ${tanggalFormat}\n` +
                          `ℹ️ *Keterangan:* ${keterangan}\n\n` +
                          `Mohon Bapak/Ibu Guru berkenan memberikan izin. Terima kasih.`;
            
            // Membuat link WhatsApp API
            const urlWhatsApp = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${encodeURIComponent(pesan)}`;
            
            // Membuka tab baru dan mengarahkan ke WhatsApp
            window.open(urlWhatsApp, '_blank');
        }
    </script>

</body>
</html>
