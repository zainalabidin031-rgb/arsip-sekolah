<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Laporan Belajar Harian</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1a4373;
            --bg-gradient: linear-gradient(135deg, #e6fffa 0%, #ebf8ff 100%);
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(43, 108, 176, 0.15), 0 8px 10px -6px rgba(43, 108, 176, 0.15);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            border-top: 6px solid var(--primary-color);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .sub-title {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
            background-color: #f7fafc;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.15);
            background-color: #fff;
        }

        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 6px;
            font-style: italic;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(43, 108, 176, 0.2);
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
            box-shadow: none;
        }

        #statusMessage {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
            line-height: 1.5;
        }

        .loading {
            background-color: #ebf8ff;
            color: #2b6cb0;
            border: 1px solid #bee3f8;
        }

        .success {
            background-color: #f0fff4;
            color: #38a169;
            border: 1px solid #c6f6d5;
        }

        .error {
            background-color: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Belajar Harian</h2>
    <div class="sub-title">Silakan isi data belajar harian siswa dengan benar</div>
    
    <form id="laporanForm">
        
        <div class="form-group">
            <label for="nama">Nama Siswa <span style="color: #e53e3e;">*</span></label>
            <select id="nama" name="nama" required>
                <option value="">-- Pilih Nama Siswa --</option>
                <option value="Achmat Juli Setyawan">Achmat Juli Setyawan</option>
                <option value="Afifa Refanda Oktavia">Afifa Refanda Oktavia</option>
                <option value="Ahmad Noval Nugroho">Ahmad Noval Nugroho</option>
                <option value="Ahmad Syahrul Dermawan">Ahmad Syahrul Dermawan</option>
                <option value="Farel Galih Revander">Farel Galih Revander</option>
                <option value="Mochammad Noer Azzam">Mochammad Noer Azzam</option>
                <option value="Muhamad Adi nur Mahendra">Muhamad Adi nur Mahendra</option>
                <option value="MUHAMMAD ALFIAN HIDAYATULLOH">MUHAMMAD ALFIAN HIDAYATULLOH</option>
                <option value="Muhammad David AufalMarom">Muhammad David AufalMarom</option>
                <option value="MUHAMMAD FAJAR IBRAHIM">MUHAMMAD FAJAR IBRAHIM</option>
                <option value="Natasya Syabila Azzahra">Natasya Syabila Azzahra</option>
                <option value="Ramadhani Rizki Hermawan">Ramadhani Rizki Hermawan</option>
                <option value="Rosalina Ayu Kirana Putri">Rosalina Ayu Kirana Putri</option>
                <option value="Tri Nurdiana">Tri Nurdiana</option>
                <option value="Tri Nurdiani">Tri Nurdiani</option>
                <option value="Yuda Setya Anggara Putra">Yuda Setya Anggara Putra</option>
            </select>
        </div>

        <div class="form-group">
            <label for="mata_pelajaran">Mata Pelajaran <span style="color: #e53e3e;">*</span></label>
            <select id="mata_pelajaran" name="mata_pelajaran" required>
                <option value="">-- Pilih Mata Pelajaran --</option>
                <option value="Pendidikan Agama Islam dan Budi Pekerti">Pendidikan Agama Islam dan Budi Pekerti</option>
                <option value="Pendidikan Pancasila">Pendidikan Pancasila</option>
                <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                <option value="Ilmu Pengetahuan Alam dan Sosial">Ilmu Pengetahuan Alam dan Sosial</option>
                <option value="Matematika">Matematika</option>
                <option value="Pendidikan Jasmani, Olahraga dan Kesehatan">Pendidikan Jasmani, Olahraga dan Kesehatan</option>
                <option value="Seni Rupa">Seni Rupa</option>
                <option value="Bahasa Inggris">Bahasa Inggris</option>
                <option value="Bahasa Jawa">Bahasa Jawa</option>
                <option value="Literasi Digital">Literasi Digital</option>
                <option value="Karya dan Kreativitas">Karya dan Kreativitas</option>
                <option value="Lainnya">Lainnya</option>
            </select>
        </div>

        <div class="form-group">
            <label for="lama_belajar">Lama Belajar <span style="color: #e53e3e;">*</span></label>
            <select id="lama_belajar" name="lama_belajar" required>
                <option value="">-- Pilih Lama Belajar --</option>
                <option value="kurang dari 15 menit">kurang dari 15 menit</option>
                <option value="30 menit">30 menit</option>
                <option value="45 menit">45 menit</option>
                <option value="60 menit">60 menit</option>
                <option value="90 menit">90 menit</option>
            </select>
        </div>

        <div class="form-group">
            <label for="pendamping">Pendamping Belajar <span style="color: #e53e3e;">*</span></label>
            <select id="pendamping" name="pendamping" required>
                <option value="">-- Pilih Pendamping --</option>
                <option value="Belajar Mandiri">Belajar Mandiri</option>
                <option value="Orang Tua (Ayah/Ibu)">Orang Tua (Ayah/Ibu)</option>
                <option value="Kakak">Kakak</option>
                <option value="Teman">Teman</option>
                <option value="Wali/Saudara Lain">Wali/Saudara Lain</option>
                <option value="Guru Les">Guru Les</option>
            </select>
        </div>

        <div class="form-group">
            <label for="keterangan">Keterangan / Catatan Belajar</label>
            <textarea id="keterangan" name="keterangan" rows="3" placeholder="Tulis apa yang masih belum di mengerti dari materi yang telah dipelajari atau kosongkan bila sudah paham."></textarea>
            <div class="hint">Boleh dikosongkan jika sudah paham semua materi.</div>
        </div>

        <button type="submit" id="submitBtn">Kirim Laporan</button>
    </form>

    <div id="statusMessage"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw_2jqvM6Yrl6vEhwV4YJ6aFuV0XWEQc78_TPVo134evVYT279v2qQgv_MgX6udM7s/exec";

    function getSubmissionCount(todayStr) {
        const count = localStorage.getItem('laporan_count_' + todayStr);
        return count ? parseInt(count, 10) : 0;
    }

    document.addEventListener("DOMContentLoaded", function() {
        const todayStr = new Date().toDateString();
        if (getSubmissionCount(todayStr) >= 2) {
            document.getElementById('submitBtn').disabled = true;
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.style.display = 'block';
            statusMessage.className = 'error';
            statusMessage.innerHTML = 'Maaf, Anda sudah mengisi batas maksimal laporan (2x) untuk hari ini. Silakan kembali besok!';
        }
    });

    document.getElementById('laporanForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const form = this;
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        const todayStr = new Date().toDateString();
        let currentCount = getSubmissionCount(todayStr);

        if (currentCount >= 2) {
            statusMessage.style.display = 'block';
            statusMessage.className = 'error';
            statusMessage.innerHTML = 'Maaf, Anda sudah mengisi batas maksimal laporan (2x) untuk hari ini.';
            return;
        }

        submitBtn.disabled = true;
        statusMessage.style.display = 'block';
        statusMessage.className = 'loading';
        statusMessage.innerHTML = 'Sedang mengirim laporan, mohon tunggu...';

        const formData = new FormData(form);
        
        fetch(WEB_APP_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        })
        .then(() => {
            form.reset();
            currentCount += 1;
            localStorage.setItem('laporan_count_' + todayStr, currentCount.toString());

            if (currentCount >= 2) {
                submitBtn.disabled = true;
                statusMessage.className = 'success';
                statusMessage.innerHTML = '<strong>Laporan sukses dikirim!</strong><br><br>Terima kasih! Semoga ilmunya bermanfaat.<br><small>(Anda telah mencapai batas pengisian maksimal 2x hari ini)</small>';
            } else {
                submitBtn.disabled = false;
                statusMessage.className = 'success';
                statusMessage.innerHTML = '<strong>Laporan sukses dikirim!</strong><br><br>Terima kasih! Semoga ilmunya bermanfaat.<br><small>(Hari ini Anda masih bisa mengisi 1 laporan lagi jika diperlukan)</small>';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            submitBtn.disabled = false;
            statusMessage.className = 'error';
            statusMessage.innerHTML = 'Terjadi kesalahan saat mengirim laporan. Silakan coba lagi.';
        });
    });
</script>

</body>
</html>
