<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Laporan Belajar Harian</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1a4373;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        select, input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }

        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
            font-style: italic;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
        }

        #statusMessage {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .loading {
            background-color: #ebf8ff;
            color: #2b6cb0;
            border: 1px solid #bee3f8;
        }

        .success {
            background-color: #f0fff4;
            color: #38a169;
            border: 1px solid #c6f6d5;
        }

        .error {
            background-color: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Laporan Belajar Harian</h2>
    <form id="laporanForm">
        
        <div class="form-group">
            <label for="nama">Nama Siswa <span style="color: red;">*</span></label>
            <select id="nama" name="nama" required>
                <option value="">-- Pilih Nama Siswa --</option>
                <option value="Achmat Juli Setyawan">Achmat Juli Setyawan</option>
                <option value="Afifa Refanda Oktavia">Afifa Refanda Oktavia</option>
                <option value="Ahmad Noval Nugroho">Ahmad Noval Nugroho</option>
                <option value="Ahmad Syahrul Dermawan">Ahmad Syahrul Dermawan</option>
                <option value="Farel Galih Revander">Farel Galih Revander</option>
                <option value="Mochammad Noer Azzam">Mochammad Noer Azzam</option>
                <option value="Muhamad Adi nur Mahendra">Muhamad Adi nur Mahendra</option>
                <option value="MUHAMMAD ALFIAN HIDAYATULLOH">MUHAMMAD ALFIAN HIDAYATULLOH</option>
                <option value="Muhammad David AufalMarom">Muhammad David AufalMarom</option>
                <option value="MUHAMMAD FAJAR IBRAHIM">MUHAMMAD FAJAR IBRAHIM</option>
                <option value="Natasya Syabila Azzahra">Natasya Syabila Azzahra</option>
                <option value="Ramadhani Rizki Hermawan">Ramadhani Rizki Hermawan</option>
                <option value="Rosalina Ayu Kirana Putri">Rosalina Ayu Kirana Putri</option>
                <option value="Tri Nurdiana">Tri Nurdiana</option>
                <option value="Tri Nurdiani">Tri Nurdiani</option>
                <option value="Yuda Setya Anggara Putra">Yuda Setya Anggara Putra</option>
            </select>
        </div>

        <div class="form-group">
            <label for="mata_pelajaran">Mata Pelajaran <span style="color: red;">*</span></label>
            <input type="text" id="mata_pelajaran" name="mata_pelajaran" placeholder="Contoh: Matematika, IPA, Bahasa Indonesia" required>
        </div>

        <div class="form-group">
            <label for="lama_belajar">Lama Belajar (Menit) <span style="color: red;">*</span></label>
            <input type="number" id="lama_belajar" name="lama_belajar" min="1" placeholder="Contoh: 60" required>
        </div>

        <div class="form-group">
            <label for="pendamping">Pendamping Belajar <span style="color: red;">*</span></label>
            <select id="pendamping" name="pendamping" required>
                <option value="">-- Pilih Pendamping --</option>
                <option value="Orang Tua (Ayah/Ibu)">Orang Tua (Ayah/Ibu)</option>
                <option value="Kakak">Kakak</option>
                <option value="Wali/Saudara Lain">Wali/Saudara Lain</option>
                <option value="Belajar Mandiri">Belajar Mandiri</option>
            </select>
        </div>

        <div class="form-group">
            <label for="keterangan">Keterangan / Catatan Belajar</label>
            <textarea id="keterangan" name="keterangan" rows="3" placeholder="Tulis apa yang masih belum di mengerti dari materi yang telah dipelajari atau kosongkan bila sudah paham."></textarea>
            <div class="hint">Boleh dikosongkan jika sudah paham semua materi.</div>
        </div>

        <button type="submit" id="submitBtn">Kirim Laporan</button>
    </form>

    <div id="statusMessage"></div>
</div>

<script>
    // URL Web App Script Anda
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw_2jqvM6Yrl6vEhwV4YJ6aFuV0XWEQc78_TPVo134evVYT279v2qQgv_MgX6udM7s/exec";

    // Cek saat halaman dibuka apakah hari ini sudah pernah mengirim
    document.addEventListener("DOMContentLoaded", function() {
        const todayStr = new Date().toDateString();
        if (localStorage.getItem('laporan_belajar_' + todayStr)) {
            document.getElementById('submitBtn').disabled = true;
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.style.display = 'block';
            statusMessage.className = 'error';
            statusMessage.innerHTML = 'Anda sudah mengirimkan laporan belajar untuk hari ini. Silakan kembali besok!';
        }
    });

    document.getElementById('laporanForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const form = this;
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        const todayStr = new Date().toDateString();

        // Validasi ganda di sisi client side sebelum mengirim
        if (localStorage.getItem('laporan_belajar_' + todayStr)) {
            statusMessage.style.display = 'block';
            statusMessage.className = 'error';
            statusMessage.innerHTML = 'Anda sudah mengirimkan laporan belajar untuk hari ini.';
            return;
        }

        // 1. Tampilkan status sedang mengirim
        submitBtn.disabled = true;
        statusMessage.style.display = 'block';
        statusMessage.className = 'loading';
        statusMessage.innerHTML = 'Sedang mengirim laporan, mohon tunggu...';

        const formData = new FormData(form);
        
        // 2. Kirim data ke Google Apps Script
        fetch(WEB_APP_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' // Menggunakan no-cors karena Apps Script tidak mengembalikan header CORS standar
        })
        .then(() => {
            // Karena no-cors, kita asumsikan pengiriman berhasil jika tidak masuk ke catch error
            form.reset();
            submitBtn.disabled = true; // Tetap kunci tombol setelah sukses
            
            // Simpan penanda di browser agar tidak bisa kirim lagi hari ini
            localStorage.setItem('laporan_belajar_' + todayStr, 'true');

            // 3. Tampilkan status sukses dan kalimat penutup
            statusMessage.className = 'success';
            statusMessage.innerHTML = '<strong>Laporan sukses dikirim!</strong><br><br>Terima kasih! Semoga ilmunya bermanfaat.';
        })
        .catch(error => {
            console.error('Error:', error);
            submitBtn.disabled = false;
            statusMessage.className = 'error';
            statusMessage.innerHTML = 'Terjadi kesalahan saat mengirim laporan. Silakan coba lagi.';
        });
    });
</script>

</body>
</html>
