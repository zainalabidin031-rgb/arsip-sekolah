<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catatan Nilai Latihan-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
    /* Animasi fade-in untuk baris tabel/kartu */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in {
      animation: fadeInUp 0.5s ease forwards;
    }
    /* Efek berkilau halus pada header */
    .bg-gradient-soft {
      background: linear-gradient(135deg, #6EE7B7 0%, #3B82F6 100%);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

  <header class="bg-gradient-soft text-white py-8 px-4 rounded-b-[2.5rem] shadow-lg mb-6 relative overflow-hidden">
    <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-xl"></div>
    <div class="absolute -left-10 -bottom-10 w-32 h-32 bg-white/10 rounded-full blur-lg"></div>
    
    <div class="max-w-md mx-auto text-center relative z-10">
      <span class="bg-white/20 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-2 inline-block">
        SDN BUTOH 1 NGASEM
      </span>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">Catatan Nilai Belajar Siswa</h1>
      <p class="text-sm text-blue-50/90 mt-1">Seri Belajar Mandiri pada Latihan-1 </p>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4">
  
  <div class="mb-4 animate-fade-in">
    <a href="javascript:history.back()" class="inline-flex items-center space-x-2 bg-white hover:bg-slate-100 text-slate-600 font-medium py-2 px-4 rounded-2xl text-xs shadow-sm border border-slate-100 transition-all duration-200 active:scale-95">
      <i class="fa-solid fa-arrow-left text-blue-500"></i>
      <span>Kembali</span>
    </a>
  </div>
    <section class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-6 transition-all duration-300 hover:shadow-md">
      <div class="flex items-center space-x-2 mb-4">
        <div class="p-2 bg-blue-50 rounded-lg text-blue-500">
          <i class="fa-solid fa-sliders text-sm"></i>
        </div>
        <h2 class="font-bold text-slate-700">Filter Data</h2>
      </div>

  <section class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-6 ...">
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div>
          <label for="filterKelas" class="block text-xs font-semibold text-slate-400 mb-1">Pilih Kelas</label>
          <div class="relative">
            <select id="filterKelas" class="w-full bg-slate-50 border border-slate-200 text-slate-600 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400 appearance-none cursor-pointer">
              <option value="">Semua Kelas</option>
              </select>
            <i class="fa-solid fa-chevron-down absolute right-3 top-3.5 text-[10px] text-slate-400 pointer-events-none"></i>
          </div>
        </div>

        <div>
          <label for="filterTanggal" class="block text-xs font-semibold text-slate-400 mb-1">Pilih Tanggal</label>
          <div class="relative">
            <select id="filterTanggal" class="w-full bg-slate-50 border border-slate-200 text-slate-600 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400 appearance-none cursor-pointer">
              <option value="">Semua Tanggal</option>
              </select>
            <i class="fa-solid fa-chevron-down absolute right-3 top-3.5 text-[10px] text-slate-400 pointer-events-none"></i>
          </div>
        </div>
      </div>

      <div class="flex space-x-2">
        <button id="btnReset" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-2 px-4 rounded-xl text-xs transition-colors duration-200 flex items-center justify-center space-x-1">
          <i class="fa-solid fa-rotate-left"></i> <span>Reset</span>
        </button>
        <button id="btnRefresh" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-xl text-xs transition-colors duration-200 flex items-center justify-center space-x-1 shadow-sm shadow-blue-200">
          <i class="fa-solid fa-sync" id="refreshIcon"></i> <span>Perbarui</span>
        </button>
      </div>
    </section>

    <div id="loading" class="hidden py-12 text-center">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent mb-3"></div>
      <p class="text-sm text-slate-400">Mengambil data dari server...</p>
    </div>

    <div id="cardsContainer" class="space-y-3">
      </div>

    <div id="emptyState" class="hidden text-center py-12 bg-white rounded-3xl p-6 border border-slate-100 shadow-sm animate-fade-in">
      <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-3">
        <i class="fa-solid fa-folder-open text-2xl"></i>
      </div>
      <h3 class="font-bold text-slate-700 mb-1">Data Tidak Ditemukan</h3>
      <p class="text-xs text-slate-400 max-w-[250px] mx-auto">Silakan ubah filter pencarian atau pastikan koneksi internet Anda stabil.</p>
    </div>

  </main>

  <script>
    // URL Web App Google Apps Script Anda (Ditambahkan parameter ?sheet=results)
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwqhRU2shRUdBbuqdjeUt6tgd3uqbO6B9krfvf9JD0eubNNeoDZDyXBz9Iqw65xCRTjJQ/exec?sheet=results';

    let originalData = [];

    // Elemen DOM
    const filterKelas = document.getElementById('filterKelas');
    const filterTanggal = document.getElementById('filterTanggal');
    const cardsContainer = document.getElementById('cardsContainer');
    const loadingEl = document.getElementById('loading');
    const emptyStateEl = document.getElementById('emptyState');
    const btnReset = document.getElementById('btnReset');
    const btnRefresh = document.getElementById('btnRefresh');
    const refreshIcon = document.getElementById('refreshIcon');

    // Fungsi Utama: Mengambil data dari Web App
    async function fetchData() {
      showLoading(true);
      try {
        const response = await fetch(webAppUrl);
        if (!response.ok) throw new Error('Koneksi bermasalah');
        const data = await response.ok ? await response.json() : [];
        
        // Simpan data asli
        originalData = data;

        // Siapkan opsi filter kelas dan tanggal dari data unik
        populateFilters(data);
        // Render data pertama kali
        renderData(data);
      } catch (error) {
        console.error('Error fetching data:', error);
        alert('Gagal memuat data. Silakan coba beberapa saat lagi.');
      } finally {
        showLoading(false);
      }
    }

    // Fungsi untuk memproses drop-down filter secara dinamis
    function populateFilters(data) {
      const kelasSet = new Set();
      const tanggalSet = new Set();

      data.forEach(item => {
        // Ambil dari nama kolom spesifik (Kls dan Timestamp)
        if (item.kls !== undefined && item.kls !== "") kelasSet.add(item.kls);
        if (item.timestamp) {
          const dateOnly = formatDateStr(item.timestamp);
          if (dateOnly) tanggalSet.add(dateOnly);
        }
      });

      // Reset opsi dropdown (sisakan opsi pertama)
      filterKelas.innerHTML = '<option value="">Semua Kelas</option>';
      filterTanggal.innerHTML = '<option value="">Semua Tanggal</option>';

      // Urutkan kelas dan tambahkan ke dropdown
      Array.from(kelasSet).sort((a,b) => a - b).forEach(kls => {
        filterKelas.innerHTML += `<option value="${kls}">Kelas ${kls}</option>`;
      });

      // Urutkan tanggal dan tambahkan ke dropdown
      Array.from(tanggalSet).sort().reverse().forEach(tgl => {
        filterTanggal.innerHTML += `<option value="${tgl}">${tgl}</option>`;
      });
    }

    // Format Tanggal ISO/Lokal ke string sederhana (YYYY-MM-DD / DD-MM-YYYY)
    function formatDateStr(dateVal) {
      if(!dateVal) return '';
      const d = new Date(dateVal);
      if (isNaN(d.getTime())) return '';
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    }

    // Fungsi menampilkan loading spinner
    function showLoading(isLoading) {
      if (isLoading) {
        loadingEl.classList.remove('hidden');
        cardsContainer.classList.add('hidden');
        emptyStateEl.classList.add('hidden');
        refreshIcon.classList.add('animate-spin');
      } else {
        loadingEl.classList.add('hidden');
        cardsContainer.classList.remove('hidden');
        refreshIcon.classList.remove('animate-spin');
      }
    }

    // Fungsi untuk merender daftar nilai ke dalam bentuk kartu interaktif
    function renderData(data) {
      cardsContainer.innerHTML = '';
      
      if (data.length === 0) {
        emptyStateEl.classList.remove('hidden');
        return;
      }
      emptyStateEl.classList.add('hidden');

      data.forEach((item, index) => {
        const nama = item.nama_siswa || 'Tanpa Nama';
        const kelas = item.kls || '-';
        const mapel = item.mata_pelajaran || '-';
        const bab = item.bab || '-';
        const nilai = parseInt(item.nilai) || 0;
        const tanggalFormated = formatDateStr(item.timestamp) || '-';

        // Tentukan warna badge nilai
        let badgeColor = 'bg-rose-50 text-rose-500 border-rose-100'; // nilai rendah (< 50)
        if (nilai >= 75) {
          badgeColor = 'bg-emerald-50 text-emerald-500 border-emerald-100'; // nilai bagus (>= 75)
        } else if (nilai >= 50) {
          badgeColor = 'bg-amber-50 text-amber-500 border-amber-100'; // nilai sedang (50-74)
        }

        const card = document.createElement('div');
        card.className = `bg-white rounded-3xl p-5 shadow-sm border border-slate-100 hover:shadow-md transition-all duration-300 animate-fade-in flex justify-between items-center relative overflow-hidden`;
        card.style.animationDelay = `${index * 50}ms`; // Efek animasi mengalir bergantian

        card.innerHTML = `
          <div class="flex-1 pr-4">
            <div class="flex items-center space-x-2 mb-1.5">
              <span class="bg-blue-50 text-blue-500 font-bold text-[10px] px-2 py-0.5 rounded-full">
                Kelas ${kelas}
              </span>
              <span class="text-[10px] text-slate-400 flex items-center space-x-1">
                <i class="fa-regular fa-calendar text-[9px]"></i> <span>${tanggalFormated}</span>
              </span>
            </div>
            <h3 class="font-bold text-slate-800 text-sm leading-tight mb-1 capitalize">${nama.toLowerCase()}</h3>
            <p class="text-xs text-slate-500 flex items-center">
              <span class="font-medium text-slate-600 mr-1.5">${mapel}</span>
              <span class="text-slate-300 mr-1.5">|</span>
              <span class="text-slate-400 truncate max-w-[120px]">${bab}</span>
            </p>
          </div>

          <div class="flex flex-col items-center justify-center">
            <div class="w-14 h-14 rounded-2xl ${badgeColor} border flex flex-col items-center justify-center shadow-inner">
              <span class="text-[9px] uppercase tracking-wider font-extrabold opacity-75 leading-none mb-0.5">Nilai</span>
              <span class="text-lg font-extrabold leading-none">${nilai}</span>
            </div>
          </div>
        `;
        cardsContainer.appendChild(card);
      });
    }

    // Fungsi Pemfilteran Data
    function applyFilters() {
      const selectedKelas = filterKelas.value;
      const selectedTanggal = filterTanggal.value;

      const filtered = originalData.filter(item => {
        const matchKelas = !selectedKelas || String(item.kls) === String(selectedKelas);
        const matchTanggal = !selectedTanggal || formatDateStr(item.timestamp) === selectedTanggal;
        return matchKelas && matchTanggal;
      });

      renderData(filtered);
    }

    // Event Listener
    filterKelas.addEventListener('change', applyFilters);
    filterTanggal.addEventListener('change', applyFilters);

    btnReset.addEventListener('click', () => {
      filterKelas.value = '';
      filterTanggal.value = '';
      renderData(originalData);
    });

    btnRefresh.addEventListener('click', fetchData);

    // Jalankan pengambilan data saat pertama kali halaman dibuka
    document.addEventListener('DOMContentLoaded', fetchData);
  </script>
</body>
</html>
