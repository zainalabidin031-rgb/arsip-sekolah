<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Asesmen Kelas 5 - SDN Butoh 1 Ngasem</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fef2f2 0%, #fff7ed 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #334155;
            padding: 20px;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 25px;
            animation: fadeInDown 0.8s ease;
        }

        .logo-area {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: 1.6rem;
            color: #0f172a;
            font-weight: 700;
            line-height: 1.3;
        }

        header p {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Grid Menu Kotak Kecil (HP Friendly) */
        .grid-container {
            width: 100%;
            max-width: 450px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            animation: fadeInUp 0.8s ease;
        }

        /* Untuk item yang ingin dibuat penuh (ganjil) */
        .full-width {
            grid-column: span 2;
        }

        /* Card Styling & Animasi */
        .menu-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            border: 2px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Warna Cerah dan Elegan untuk Tiap Kotak */
        .c-lat1 { border-bottom: 5px solid #3b82f6; }
        .c-lat2 { border-bottom: 5px solid #60a5fa; }
        .c-nil1 { border-bottom: 5px solid #10b981; }
        .c-nil2 { border-bottom: 5px solid #34d399; }
        .c-pr { border-bottom: 5px solid #f59e0b; }
        .c-ulang { border-bottom: 5px solid #ef4444; }
        .c-nil-ulang { border-bottom: 5px solid #8b5cf6; }

        /* Icon Box Styling */
        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        /* Background Lembut untuk Icon */
        .c-lat1 .icon-box { background-color: #eff6ff; color: #3b82f6; }
        .c-lat2 .icon-box { background-color: #f0f7ff; color: #60a5fa; }
        .c-nil1 .icon-box { background-color: #ecfdf5; color: #10b981; }
        .c-nil2 .icon-box { background-color: #f0fdf4; color: #34d399; }
        .c-pr .icon-box { background-color: #fffbeb; color: #f59e0b; }
        .c-ulang .icon-box { background-color: #fef2f2; color: #ef4444; }
        .c-nil-ulang .icon-box { background-color: #f5f3ff; color: #8b5cf6; }

        .menu-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1e293b;
        }

        /* Animasi saat ditekan/di-hover */
        .menu-card:active, .menu-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.08);
            background: #fafafa;
        }

        .menu-card:active .icon-box, .menu-card:hover .icon-box {
            transform: rotate(-8deg) scale(1.1);
        }

        /* Khusus layout penuh untuk Nilai Ulangan agar seimbang */
        .full-width.menu-card {
            flex-direction: row;
            justify-content: flex-start;
            padding: 15px 25px;
            text-align: left;
        }
        .full-width.menu-card .icon-box {
            margin-bottom: 0;
            margin-right: 20px;
        }

        /* Tombol Kembali */
        .btn-kembali {
            margin-top: 35px;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background-color: #64748b;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.2);
            transition: all 0.3s ease;
            animation: fadeIn 1.2s ease;
        }

        .btn-kembali:active, .btn-kembali:hover {
            background-color: #475569;
            transform: scale(0.95);
        }

        /* Keyframes Animasi */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="icon-box">
    <img src="../assets/favicon.png" style="width: 35px; height: 35px; object-fit: contain;">
</div>
        <h1>Halaman Asesmen</h1>
        <p>SDN Butoh 1 Ngasem • Kelas 5</p>
    </header>

    <div class="grid-container">
        
        <a href="../latihan-soal/" class="menu-card c-lat1">
            <div class="icon-box">
                <i class="fa-solid fa-pen-clip"></i>
            </div>
            <h3>Latihan-1</h3>
        </a>

        <a href="../HalamanUlangan/" class="menu-card c-lat2">
            <div class="icon-box">
                <i class="fa-solid fa-pen-to-square"></i>
            </div>
            <h3>Latihan-2</h3>
        </a>

        <a href="../latihan-soal/cek-nilai/" class="menu-card c-nil1">
            <div class="icon-box">
                <i class="fa-solid fa-star"></i>
            </div>
            <h3>Nilai-1</h3>
        </a>

        <a href="../Grade-5/nilai/nilailat2.html" class="menu-card c-nil2">
            <div class="icon-box">
                <i class="fa-solid fa-award"></i>
            </div>
            <h3>Nilai-2</h3>
        </a>

        <a href="pr.html" class="menu-card c-pr">
            <div class="icon-box">
                <i class="fa-solid fa-house-laptop"></i>
            </div>
            <h3>Tugas / PR</h3>
        </a>

        <a href="https://script.google.com/macros/s/AKfycbwFX8F8C1AbYqtKTVZYqoftf70fe41Ek-nG3CNB62rY17CZnUybvyp-YgWgpv9uXS57lQ/exec" class="menu-card c-ulang">
            <div class="icon-box">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h3>Ulangan</h3>
        </a>

        <a href="nilai/" class="menu-card c-nil-ulang full-width">
            <div class="icon-box">
                <i class="fa-solid fa-chart-simple"></i>
            </div>
            <h3>Nilai Ulangan</h3>
        </a>

    </div>

    <a href="../Grade-5/" class="btn-kembali">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Menu Utama
    </a>

</body>
</html>
