<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Digital Kelas 5 - SDN Butoh 1 Ngasem</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #334155;
            padding: 20px;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .logo-area {
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 1.6rem;
            color: #0f172a;
            font-weight: 700;
            line-height: 1.3;
        }

        header p {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Container Menu HP Friendly */
        .menu-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeInUp 0.8s ease;
        }

        /* Tag <a> untuk Link Fitur */
        .feat-link {
            text-decoration: none;
            color: #ffffff;
            display: block;
        }

        /* PERBAIKAN CARD: Menggunakan Konsep Kotak Model feat-card */
        .feat-card {
            border-radius: 18px;
            padding: 20px;
            display: flex;
            align-items: center;
            text-align: left;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Styling Emoji di Dalam Span */
        .feat-card span {
            font-size: 2.2rem;
            margin-right: 20px;
            display: block;
            transition: transform 0.3s ease;
            line-height: 1;
        }

        /* Pembungkus teks nama menu & deskripsi */
        .card-text-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .feat-card p {
            font-size: 0.78rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
        }

        /* Variasi Warna Solid Tebal & Elegan */
        .f1 { background-color: #0D47A1; }
        .f2 { background-color: #E65100; }
        .f3 { background-color: #880E4F; }

        /* Efek Animasi Hover & Active Tekan Layar HP */
        .feat-link:hover .feat-card, .feat-link:active .feat-card {
            transform: translateY(-4px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.15);
            filter: brightness(1.1);
        }

        .feat-link:hover span, .feat-link:active span {
            transform: scale(1.15) rotate(-5deg);
        }

        /* Tombol Kembali */
        .btn-kembali {
            margin-top: 40px;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background-color: #64748b;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.3);
            transition: all 0.3s ease;
            animation: fadeIn 1.2s ease;
        }

        .btn-kembali:active, .btn-kembali:hover {
            background-color: #475569;
            transform: scale(0.95);
        }

        /* Keyframes Animasi */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="../assets/favicon.png" alt="Logo Sekolah" style="width: 80px; height: auto;">
        </div>
        <h1>Ruang Digital Kelas 5</h1>
        <p>SDN Butoh 1 Ngasem</p>
    </header>

    <div class="menu-container">
        
        <a href="Materi/" class="feat-link">
            <div class="feat-card f1">
                <span>📖</span>
                <div class="card-text-wrapper">
                    MATERI AJAR
                    <p>Kumpulan materi ajar semua mata pelajaran kelas 5</p>
                </div>
            </div>
        </a>

        <a href="Administrasi/bukupaket.html" class="feat-link">
            <div class="feat-card f2">
                <span>💡</span>
                <div class="card-text-wrapper">
                    BUKU PAKET
                    <p>Buku paket digital (E-Book) Kementerian Pendidikan</p>
                </div>
            </div>
        </a>

        <a href="perpustakaan/" class="feat-link">
            <div class="feat-card f3">
                <span>🏢</span>
                <div class="card-text-wrapper">
                    PERPUSTAKAAN DIGITAL
                    <p>Baca buku cerita, komik dan ilmu pengetahuan</p>
                </div>
            </div>
        </a>

    </div>

    <a href="../Grade-5/" class="btn-kembali">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Utama
    </a>

</body>
</html>
