<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Digital Kelas 5 - SDN Butoh 1 Ngasem</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #334155;
            padding: 20px;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .logo-area {
            font-size: 3rem;
            color: #0284c7;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.6rem;
            color: #0f172a;
            font-weight: 700;
            line-height: 1.3;
        }

        header p {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Container Menu */
        .menu-container {
            width: 100%;
            max-width: 450px; /* Pas untuk ukuran layar HP */
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeInUp 0.8s ease;
        }

        /* Card Styling & Animasi */
        .menu-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 2px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Variasi Warna Cerah & Elegan tiap Menu */
        .card-materi { border-left: 6px solid #0ea5e9; }
        .card-buku { border-left: 6px solid #10b981; }
        .card-perpus { border-left: 6px solid #f59e0b; }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 20px;
            transition: transform 0.3s ease;
        }

        .card-materi .icon-box { background-color: #e0f2fe; color: #0ea5e9; }
        .card-buku .icon-box { background-color: #d1fae5; color: #10b981; }
        .card-perpus .icon-box { background-color: #fef3c7; color: #f59e0b; }

        .card-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 2px;
        }

        .card-info p {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .arrow-icon {
            margin-left: auto;
            color: #cbd5e1;
            transition: transform 0.3s ease;
        }

        /* Efek Animasi saat Kartu Ditekan/Disentuh (HP Friendly) */
        .menu-card:active, .menu-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
            background: #fafafa;
        }

        .menu-card:active .icon-box, .menu-card:hover .icon-box {
            transform: rotate(10deg) scale(1.1);
        }

        .menu-card:active .arrow-icon, .menu-card:hover .arrow-icon {
            transform: translateX(5px);
            color: #64748b;
        }

        /* Tombol Kembali */
        .btn-kembali {
            margin-top: 40px;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background-color: #64748b;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.3);
            transition: all 0.3s ease;
            animation: fadeIn 1.2s ease;
        }

        .btn-kembali:active, .btn-kembali:hover {
            background-color: #475569;
            transform: scale(0.95);
        }

        /* Keyframes Animasi Masuk */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
    <img src="../assets/favicon.png" alt="Logo Sekolah" style="width: 80px; height: auto;">
</div>
        <h1>Ruang Digital Kelas 5</h1>
        <p>SDN Butoh 1 Ngasem</p>
    </header>

    <div class="menu-container">
        
        <a href="Materi/" class="menu-card card-materi">
            <div class="icon-box">
                <i class="fa-solid fa-book-open-reader"></i>
            </div>
            <div class="card-info">
                <h3>Materi Ajar</h3>
                <p>Kumpulan Materi Ajar Semua Mata Pelajaran Kelas 5</p>
            </div>
            <i class="fa-solid fa-chevron-right arrow-icon"></i>
        </a>

        <a href="Administrasi/bukupaket.html" class="menu-card card-buku">
            <div class="icon-box">
                <i class="fa-solid fa-book"></i>
            </div>
            <div class="card-info">
                <h3>Buku Paket</h3>
                <p>Buku Paket Digital (E-Book) Kementerian Pendidikan</p>
            </div>
            <i class="fa-solid fa-chevron-right arrow-icon"></i>
        </a>

        <a href="perpustakaan/" class="menu-card card-perpus">
            <div class="icon-box">
                <i class="fa-solid fa-icons"></i>
            </div>
            <div class="card-info">
                <h3>Perpustakaan Digital</h3>
                <p>Baca Buku Cerita, Komik dan Ilmu Pengetahuan</p>
            </div>
            <i class="fa-solid fa-chevron-right arrow-icon"></i>
        </a>

    </div>

    <a href="../Grade-5/" class="btn-kembali">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Utama
    </a>

</body>
</html>
