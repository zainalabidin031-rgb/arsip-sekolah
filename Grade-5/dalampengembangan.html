<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitur Dalam Pengembangan</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            padding: 40px 30px;
            text-align: center;
        }

        .icon-container {
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
        }

        /* Efek animasi roda gigi berputar pelan */
        .icon-bg {
            font-size: 4rem;
            color: #e2e8f0;
            animation: spin 8s linear infinite;
        }

        .icon-main {
            font-size: 2.5rem;
            color: #6b21a2; /* Warna ungu senada dengan rekap bulanan Anda */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 1.5rem;
            color: #1e3a8a; /* Warna biru senada dengan web absen Anda */
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .badge-progress {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #f3e8ff;
            color: #6b21a2;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #1e3a8a;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2);
        }

        .btn-back:hover {
            background-color: #172554;
        }

        /* Animasi Rotasi */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Optimasi HP */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.3rem;
            }
            p {
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="badge-progress">
            <i class="fa-solid fa-spinner fa-spin"></i> Dalam Proses
        </span>

        <div class="icon-container">
            <i class="fa-solid fa-gear icon-bg"></i>
            <i class="fa-solid fa-hammer icon-main"></i>
        </div>

        <h1>Fitur Masih Dikembangkan</h1>
        <p>
            Mohon maaf, halaman ini sedang dalam progress penyelesaian oleh tim IT SDN Butoh 1 Ngasem untuk memberikan pengalaman terbaik bagi Anda. Silakan kembali beberapa saat lagi! ⚙️✨
        </p>

        <button onclick="window.history.back()" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Kembali ke Halaman Utama
        </button>
    </div>

</body>
</html>
