<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Siswa & Alumni</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #e3f2fd,
        #f5fbff,
        #ffffff
    );

    min-height:100vh;

    padding:20px;

}

.container{

    width:100%;

    max-width:900px;

    margin:auto;

}

.back-home{

    display:inline-block;

    margin-bottom:20px;

    text-decoration:none;

    background:#2196f3;

    color:white;

    padding:10px 18px;

    border-radius:10px;

    font-weight:600;

}

.back-home:hover{

    background:#1976d2;

}

.login-card{

    max-width:460px;

    margin:30px auto;

    background:white;

    border-radius:22px;

    padding:35px;

    box-shadow:
    0 8px 30px rgba(0,0,0,.08);

}

.logo{

    text-align:center;

    font-size:60px;

}

.title{

    text-align:center;

    margin-top:10px;

    font-size:30px;

    font-weight:700;

    color:#1565c0;

}

.subtitle{

    text-align:center;

    margin-top:8px;

    margin-bottom:25px;

    color:#607d8b;

}

.form-group{

    margin-bottom:18px;

}

label{

    display:block;

    margin-bottom:8px;

    color:#1976d2;

    font-weight:600;

}

input{

    width:100%;

    padding:13px;

    border-radius:10px;

    border:1px solid #cfd8dc;

    outline:none;

    font-size:15px;

}

input:focus{

    border-color:#00acc1;

}

.btn{

    width:100%;

    border:none;

    cursor:pointer;

    background:#00acc1;

    color:white;

    padding:14px;

    border-radius:12px;

    font-size:16px;

    font-weight:700;

}

.btn:hover{

    background:#00838f;

}

.loading{

    display:none;

    margin-top:15px;

    text-align:center;

    color:#00838f;

    font-weight:600;

}

.error{

    display:none;

    margin-top:15px;

    background:#ffebee;

    color:#c62828;

    padding:12px;

    border-radius:10px;

}

.profile{

    display:none;

}

.profile-card{

    background:white;

    border-radius:22px;

    padding:35px;

    box-shadow:
    0 8px 30px rgba(0,0,0,.08);

}

.avatar{

    width:100px;

    height:100px;

    margin:auto;

    border-radius:50%;

    background:#b2ebf2;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:44px;

}

.student-name{

    text-align:center;

    margin-top:15px;

    font-size:28px;

    font-weight:700;

    color:#006064;

}

.status-box{

    text-align:center;

    margin-top:12px;

}

.badge{

    display:inline-block;

    padding:8px 18px;

    border-radius:30px;

    color:white;

    font-weight:600;

}

.badge.aktif{

    background:#2e7d32;

}

.badge.lulus{

    background:#1976d2;

}

.info-table{

    width:100%;

    border-collapse:collapse;

    margin-top:30px;

}

.info-table td{

    padding:14px 10px;

    border-bottom:1px solid #eceff1;

}

.info-table td:first-child{

    width:35%;

    font-weight:600;

    color:#00695c;

}

.footer-note{

    margin-top:20px;

    text-align:center;

    color:#78909c;

    font-size:13px;

}

@media(max-width:700px){

    .login-card,
    .profile-card{

        padding:22px;

    }

    .student-name{

        font-size:22px;

    }

    .info-table td{

        display:block;

        width:100%;

        border:none;

        padding:6px 0;

    }

    .info-table tr{

        display:block;

        border-bottom:1px solid #eceff1;

        margin-bottom:15px;

        padding-bottom:10px;

    }

}

</style>

</head>

<body>

<div class="container">

<a
href="index.html"
class="back-home">

← Beranda

</a>

<div
class="login-card"
id="loginCard">

<div class="logo">

🎓

</div>

<div class="title">

👤 Data Siswa & Alumni

</div>

<div class="subtitle">

Masukkan NISN dan Tanggal Lahir

</div>

<div class="form-group">

<label>

NISN

</label>

<input
type="text"
id="nisn"
placeholder="Masukkan NISN">

</div>

<div class="form-group">

<label>

Tanggal Lahir

</label>

<input
type="date"
id="tanggalLahir">

</div>

<button
class="btn"
onclick="loginProfil()">

Lihat Data

</button>

<div
class="loading"
id="loading">

Memuat data...

</div>

<div
class="error"
id="errorBox">

</div>

</div>

<div
class="profile"
id="profile">

<div class="profile-card">

<div class="avatar">

👦

</div>

<div
class="student-name"
id="nama">

-

</div>

<div
class="status-box">

<span
class="badge aktif"
id="status">

-

</span>

</div>

<table class="info-table">

<tr>

<td>Nama Lengkap</td>

<td id="namaView">-</td>

</tr>

<tr>

<td>NIS</td>

<td id="nis">-</td>

</tr>

<tr>

<td>NISN</td>

<td id="nisnView">-</td>

</tr>

<tr>

<td>Kelas</td>

<td id="kelas">-</td>

</tr>

<tr>

<td>Status</td>

<td id="statusText">-</td>

</tr>

<tr>

<td>Wali Kelas</td>

<td id="wali">-</td>

</tr>

<tr>

<td>Nama Ayah</td>

<td id="ayah">-</td>

</tr>

<tr>

<td>Nama Ibu</td>

<td id="ibu">-</td>

</tr>

</table>

<div
class="footer-note"
id="updateInfo">

Terakhir diperbarui: -

</div>

</div>

</div>

</div>

<!-- JavaScript akan ditambahkan pada bagian berikutnya -->
<script>

// ========================================
// GANTI DENGAN URL WEB APP APPS SCRIPT
// ========================================

const API_URL = "https://script.google.com/macros/s/AKfycbx4UAzzQ6Ft9D014LQdlu6KGsE9kTtz3EZIlWcxa0nmtg349enyzfETElpjhiSg2JOa/exec";

// ========================================

const loading =
document.getElementById("loading");

const errorBox =
document.getElementById("errorBox");

// ========================================

function showLoading(){

    loading.style.display="block";

}

function hideLoading(){

    loading.style.display="none";

}

function showError(msg){

    errorBox.style.display="block";

    errorBox.textContent=msg;

}

function hideError(){

    errorBox.style.display="none";

    errorBox.textContent="";

}

// ========================================

async function loginProfil(){

    hideError();

    const nisn =
    document
    .getElementById("nisn")
    .value
    .trim();

    const tanggal =
    document
    .getElementById("tanggalLahir")
    .value;

    if(!nisn){

        showError(
        "Silakan masukkan NISN."
        );

        return;

    }

    if(!tanggal){

        showError(
        "Silakan pilih Tanggal Lahir."
        );

        return;

    }

    showLoading();

    try{

        const url =
        API_URL +
        "?action=profil" +
        "&nisn=" +
        encodeURIComponent(nisn) +
        "&tanggalLahir=" +
        encodeURIComponent(tanggal);

        const res =
        await fetch(url);

        const json =
        await res.json();

        hideLoading();

        if(!json.success){

            showError(
            json.message ||
            "Data tidak ditemukan."
            );

            return;

        }

        tampilkanProfil(
        json.data
        );

    }

    catch(err){

        hideLoading();

        showError(
        "Tidak dapat terhubung ke server."
        );

        console.log(err);

    }

}

// ========================================

function tampilkanProfil(data){

    document
    .getElementById("loginCard")
    .style
    .display="none";

    document
    .getElementById("profile")
    .style
    .display="block";

    document
    .getElementById("nama")
    .textContent =
    data.nama || "-";

    document
    .getElementById("namaView")
    .textContent =
    data.nama || "-";

    document
    .getElementById("nis")
    .textContent =
    data.nis || "-";

    document
    .getElementById("nisnView")
    .textContent =
    data.nisn || "-";

    document
    .getElementById("kelas")
    .textContent =
    data.kelas || "-";

    document
    .getElementById("wali")
    .textContent =
    data.waliKelas || "-";

    document
    .getElementById("ayah")
    .textContent =
    data.namaAyah || "-";

    document
    .getElementById("ibu")
    .textContent =
    data.namaIbu || "-";

    document
    .getElementById("statusText")
    .textContent =
    data.status || "-";

    document
    .getElementById("updateInfo")
    .textContent =
    "Terakhir diperbarui: " +
    (data.terakhirUpdate || "-");

    const badge =
    document
    .getElementById("status");

    badge.textContent =
    data.status || "-";

    badge.className =
    "badge " +
    (
        String(data.status)
        .toLowerCase() ===
        "lulus"

        ?

        "lulus"

        :

        "aktif"
    );

}

</script>
  
</body>
</html>
