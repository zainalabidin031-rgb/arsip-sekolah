<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unduh Sertifikat TKA</title>
    <link rel="icon" type="image/png" href="../../../favicon.png?v=1">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; /* Warna latar belakang halaman default */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px; /* Sedikit lebih membulat */
            box-shadow: 0 6px 20px rgba(0,0,0,0.1); /* Shadow lebih lembut */
            width: 100%;
            max-width: 450px;
            border: 1px solid #ddd; /* Border tipis untuk container */
        }
        h2 {
            text-align: center;
            color: #4b0082; /* Warna Ungu Matang untuk Judul */
            margin-bottom: 25px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd; /* Border input lebih tebal */
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s; /* Transisi halus saat fokus */
        }
        input[type="text"]:focus, input[type="date"]:focus {
            border-color: #00bfff; /* Warna Biru Cerah saat fokus */
            outline: none;
        }
        button.btn-check {
            width: 100%;
            padding: 14px;
            background-color: #00bfff; /* Warna Biru Cerah & Segar untuk Tombol Utama */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button.btn-check:hover {
            background-color: #009acd; /* Biru sedikit lebih gelap saat hover */
        }
        .result-box {
            display: none; /* Sembunyikan pertama kali */
            margin-top: 30px;
            padding: 25px;
            border-top: 2px dashed #bbb;
            background-color: #f9f9f9;
            border-radius: 8px;
        }
        .result-title {
            font-size: 20px;
            font-weight: bold;
            color: #4b0082; /* Ungu Matang untuk Judul Hasil */
            margin-bottom: 15px;
            text-align: center;
        }
        .data-info {
            margin-bottom: 20px;
            font-size: 15px;
            color: #444;
            line-height: 1.6;
        }
        .data-info p {
            margin: 8px 0;
        }
        .data-info strong {
            color: #333;
        }
        .btn-download {
            background-color: #6a5acd; /* Warna Ungu Matang (SlateBlue) untuk Tombol Download */
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            display: block; /* Agar link berperilaku seperti block element */
            text-align: center;
            text-decoration: none;
        }
        .btn-download:hover {
            background-color: #483d8b; /* Ungu lebih gelap (DarkSlateBlue) saat hover */
        }
        .error-msg {
            color: #d9534f; /* Warna merah gelap untuk error */
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            font-weight: 600;
        }
    </style>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Sertifikat TKA - SDN Butoh 1 Ngasem</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Unduh Sertifikat TKA - SDN Butoh 1 Ngasem">
    <meta property="og:description" content="Masukkan NISN dan Tanggal Lahir untuk mengunduh Sertifikat.">
    
    <meta property="og:image" content="https://sdnbutoh1ngasem.my.id/assets/meta.png">
    
    <meta property="og:url" content="https://sdnbutoh1ngasem.my.id/portal-orangtua/dhtka/">

    <meta name="twitter:card" content="summary_large_image">
</head>
</head>
<body>

<div class="container">
    <h2>Unduh Mandiri 
        Sertifikat Hasil TKA SD</h2>
    
    <!-- Form Input -->
    <div class="form-group">
        <label for="nisn">NISN</label>
        <input type="text" id="nisn" placeholder="Masukkan 10 digit NISN" autocomplete="off">
    </div>
    <div class="form-group">
    <label for="tgl_lahir">Tanggal Lahir (Format: HH-BB-TTTT)</label>
    <input type="text" id="tgl_lahir" placeholder="Contoh: 15-05-2008" autocomplete="off">
</div>
    
    <button class="btn-check" onclick="cekData()">Periksa Data</button>
    <p class="error-msg" id="error">NISN atau Tanggal Lahir salah/tidak ditemukan!</p>

    <!-- Tempat Muncul Data & Tombol Download -->
    <div class="result-box" id="resultBox">
        <div class="result-title">Sertifikat Tersedia!</div>
        <div class="data-info">
            <p><strong>Nama:</strong> <span id="resNama"></span></p>
            <p><strong>NISN:</strong> <span id="resNisn"></span></p>
            <p><strong>Status:</strong> <span id="resKet"></span></p>
        </div>
        <!-- Link download disamarkan sebagai tombol -->
        <a id="downloadLink" href="#" download class="btn-download">
            Unduh Sertifikat (PDF)
        </a>
    </div>
</div>

<script>

            nama: "LISANI_YUBAYINU_NAFI_AH",
            keterangan: "Peserta TKA SD Th. 2026",
            fileSertifikat: "3144144665 - LISANI_YUBAYINU_NAFI_AH.pdf"
        }
    ];

    function cekData() {
    const inputNisn = document.getElementById('nisn').value.trim();
    
    // 1. Ambil input tanggal dari murid
    let inputTgl = document.getElementById('tgl_lahir').value.trim();
    
    // 2. JURUS PINTAR: Mengubah semua garis miring (/) menjadi strip (-) otomatis
    inputTgl = inputTgl.replace(/\//g, '-');

    const errorMsg = document.getElementById('error');
    const resultBox = document.getElementById('resultBox');

    // 3. Cari data di database (sekarang sudah pasti formatnya pakai strip)
    const siswa = databaseSiswa.find(s => s.nisn === inputNisn && s.tglLahir === inputTgl);

    if (siswa) {
        errorMsg.style.display = 'none';
        resultBox.style.display = 'block';

        document.getElementById('resNama').innerText = siswa.nama;
        document.getElementById('resNisn').innerText = siswa.nisn;
        document.getElementById('resKet').innerText = siswa.keterangan;

        document.getElementById('downloadLink').href = siswa.fileSertifikat;
    } else {
        resultBox.style.display = 'none';
        errorMsg.style.display = 'block';
    }
}
</script>
</body>
</html>
