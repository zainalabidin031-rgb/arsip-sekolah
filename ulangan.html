<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Ulangan Harian</title>

<style>

body{
font-family:Segoe UI;
background:#eaf6ff;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0099ff;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-primary{
background:#00a8ff;
color:white;
}

.btn-success{
background:#00c853;
color:white;
}

.btn-danger{
background:#ff5252;
color:white;
}

.btn-back{
background:#607d8b;
color:white;
}

.soal{
margin-bottom:25px;
padding:15px;
background:#f7fbff;
border-left:5px solid #00a8ff;
}

.nilai-box{
text-align:center;
padding:30px;
background:#f0fff4;
border-radius:15px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>📘 Ulangan Online</h1>

<div id="formAwal">

<label>Nama Lengkap</label>
<input id="nama">

<label>NISN</label>
<input id="nisn">

<label>Kelas</label>
<input id="kelas">

<label>Mata Pelajaran</label>
<input id="mapel">

<button class="btn-primary" onclick="mulai()">
Mulai Ulangan
</button>

<button class="btn-back"
onclick="history.back()">
Kembali
</button>

</div>

<div id="areaSoal"></div>

<div id="hasil"></div>

</div>

<script>

let soalGlobal=[];

function mulai(){

const kelas=document.getElementById("kelas").value;
const mapel=document.getElementById("mapel").value;

google.script.run
.withSuccessHandler(tampilkanSoal)
.getSoal(kelas,mapel);

}

function tampilkanSoal(data){

soalGlobal=data;

let html="";

data.forEach((s,i)=>{

html+=`
<div class="soal">

<p><b>${i+1}. ${s.soal}</b></p>

<label>
<input type="radio" name="s${i}" value="A">
${s.a}
</label><br>

<label>
<input type="radio" name="s${i}" value="B">
${s.b}
</label><br>

<label>
<input type="radio" name="s${i}" value="C">
${s.c}
</label><br>

<label>
<input type="radio" name="s${i}" value="D">
${s.d}
</label>

</div>
`;
});

html+=`
<button class="btn-success"
onclick="selesai()">
Selesai Ulangan
</button>
`;

document.getElementById("formAwal").style.display="none";
document.getElementById("areaSoal").innerHTML=html;

}

function selesai(){

let benar=0;

soalGlobal.forEach((s,i)=>{

const jawaban=document.querySelector(
`input[name="s${i}"]:checked`
);

if(jawaban){

if(
jawaban.value.toUpperCase() ==
s.benar.toUpperCase()
){
benar++;
}

}

});

const nilai=
Math.round(
(benar/soalGlobal.length)*100
);

const data={
nama:document.getElementById("nama").value,
nisn:document.getElementById("nisn").value,
kelas:document.getElementById("kelas").value,
mapel:document.getElementById("mapel").value,
nilai:nilai
};

google.script.run.simpanNilai(data);

let html=`
<div class="nilai-box">

<h2>Nilai Anda</h2>

<h1>${nilai}</h1>
`;

if(nilai>=80){

html+=`
<h3 style="color:green">
🎉 Selamat, Anda Lulus!
</h3>
`;

}else{

html+=`
<h3 style="color:red">
Nilai masih di bawah 80
</h3>

<button class="btn-danger"
onclick="location.reload()">
Ulangi Ulangan
</button>
`;

}

html+=`
<br><br>

<button class="btn-back"
onclick="history.back()">
Kembali
</button>

</div>
`;

document.getElementById("areaSoal").style.display="none";
document.getElementById("hasil").innerHTML=html;

}

</script>

</body>
</html>
