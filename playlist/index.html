<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Belajar Audio - SDN Butoh 1 Ngasem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* RESET BASE STYLES */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f6f9fc; /* Abu-abu terang premium, sama dengan halaman utama */
            color: #2d3748;
            padding: 50px 20px;
        }

        .playlist-wrapper {
            max-width: 750px;
            margin: 0 auto; /* Memastikan kotak berada di tengah halaman */
        }

        .playlist-container {
            width: 100%;
            background: #ffffff; /* Kotak putih bersih */
            border: 1px solid #e2eefe;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 119, 255, 0.03);
        }

        /* HEADER PLAYLIST */
        .playlist-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid #e6f2ff;
            padding-bottom: 20px;
        }
        .playlist-header i {
            font-size: 28px;
            color: #0077ff; 
        }
        .playlist-header h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #1a202c;
            letter-spacing: -0.5px;
        }
        .playlist-header p {
            font-size: 13px;
            color: #718096;
        }

        /* DAFTAR LAGU RAMPING */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        .track-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto; 
            align-items: center;
            background: #f8fafc; /* Latar lagu abu-abu sangat soft */
            border: 1px solid #edf2f7;
            padding: 12px 20px;
            border-radius: 14px;
            gap: 20px;
            transition: all 0.2s ease;
        }

        .track-item:hover {
            background: #e6f2ff; /* Berubah biru soft khas sekolah saat di-hover */
            border-color: #0077ff;
            transform: translateY(-2px);
        }

        .track-number {
            font-size: 13px;
            font-weight: 700;
            color: #a0aec0;
            width: 20px;
        }

        .track-info {
            min-width: 0; 
        }
        .track-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #2d3748;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 12px;
            color: #718096;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* Mini Player Memanjang */
        .audio-player-wrapper {
            display: flex;
            align-items: center;
        }
        audio {
            height: 32px; 
            width: 240px; 
            border-radius: 30px;
        }

        /* Tombol Unduh Kanan */
        .btn-download {
            width: 36px;
            height: 36px;
            background: #ffffff;
            border: 1px solid #e2eefe;
            color: #0077ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-download:hover {
            background: #0077ff;
            color: #ffffff;
            border-color: #0077ff;
        }

        /* TOMBOL NAVIGASI BAWAH */
        .playlist-navigation {
            display: flex;
            justify-content: flex-end; 
            gap: 12px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e6f2ff; 
        }

        .btn-nav {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-nav.btn-back-music {
            background-color: #ffffff;
            color: #718096;
            border: 1px solid #edf2f7;
        }
        .btn-nav.btn-back-music:hover {
            background-color: #edf2f7;
            color: #2d3748;
            transform: translateX(-3px);
        }

        .btn-nav.btn-next-music {
            background: linear-gradient(135deg, #4c1d95 0%, #0077ff 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(0, 119, 255, 0.15);
        }
        .btn-nav.btn-next-music:hover {
            box-shadow: 0 6px 20px rgba(0, 119, 255, 0.25);
            transform: translateX(3px);
        }

        /* RESPONSIVE SMARTPHONE */
        @media (max-width: 640px) {
            .track-item {
                grid-template-columns: 1fr auto;
                gap: 12px;
                padding: 15px;
            }
            .audio-player-wrapper {
                grid-column: span 2;
                width: 100%;
            }
            audio {
                width: 100%; 
            }
            .track-number { display: none; }
            .playlist-navigation {
                justify-content: space-between; 
            }
            .btn-nav {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="playlist-wrapper">
        <div class="playlist-container">
            
            <div class="playlist-header">
                <i class="fa-solid fa-circle-play"></i>
                <div>
                    <h2>Audio Learning Hub</h2>
                    <p>Daftar materi listening dan lagu edukasi murid</p>
                </div>
            </div>

            <div class="track-list">
                
                <div class="track-item">
                    <div class="track-number">01</div>
                    <div class="track-info">
                        <div class="track-title">Food and Drinks Song</div>
                        <div class="track-artist">Vocabulary Section • Unit 4</div>
                    </div>
                    <div class="audio-player-wrapper">
                        <audio controls src="audio/food-drinks.mp3"></audio> 
                    </div>
                    <a href="audio/food-drinks.mp3" download class="btn-download" title="Unduh Lagu">
                        <i class="fa-solid fa-cloud-arrow-down"></i>
                    </a>
                </div>

                <div class="track-item">
                    <div class="track-number">02</div>
                    <div class="track-info">
                        <div class="track-title">Greetings and Introduction</div>
                        <div class="track-artist">Listening Practice • Unit 1</div>
                    </div>
                    <div class="audio-player-wrapper">
                        <audio controls src="audio/greetings.mp3"></audio>
                    </div>
                    <a href="audio/greetings.mp3" download class="btn-download" title="Unduh Lagu">
                        <i class="fa-solid fa-cloud-arrow-down"></i>
                    </a>
                </div>

                <div class="track-item">
                    <div class="track-number">03</div>
                    <div class="track-info">
                        <div class="track-title">Days and Months Rhythm</div>
                        <div class="track-artist">Fun Learning Game • Unit 2</div>
                    </div>
                    <div class="audio-player-wrapper">
                        <audio controls src="audio/days-months.mp3"></audio>
                    </div>
                    <a href="audio/days-months.mp3" download class="btn-download" title="Unduh Lagu">
                        <i class="fa-solid fa-cloud-arrow-down"></i>
                    </a>
                </div>

            </div>

            <div class="playlist-navigation">
                <a href="../" class="btn-nav btn-back-music">
                    <i class="fa-solid fa-chevron-left"></i> Kembali
                </a>
                <a href="materi-selanjutnya.html" class="btn-nav btn-next-music">
                    Lanjut <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>

        </div> 
    </div>

</body>
</html>
