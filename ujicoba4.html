<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMB - Dinas Pendidikan Kota Surabaya</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white border-b border-gray-200 py-4 px-6 shadow-xs">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Lambang_Kota_Surabaya.svg" alt="Logo Surabaya" class="h-16 w-auto">
                <div>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight leading-none">SPMB SURABAYA</h1>
                    <p class="text-xs text-red-600 font-semibold mt-1">Sistem Penerimaan Murid Baru Online</p>
                    <p class="text-xs text-gray-500 font-medium">Dinas Pendidikan Kota Surabaya</p>
                </div>
            </div>
            
            <div class="text-center md:text-right bg-gray-50 border border-gray-200 rounded-lg p-3 text-xs">
                <div class="font-bold text-gray-700"><i class="far fa-clock mr-1 text-red-500"></i> Sistem Online</div>
                <div class="text-gray-500 mt-0.5">Tahun Ajaran 2026/2027</div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <aside class="lg:col-span-1 space-y-4">
            <div class="bg-white rounded-lg shadow-xs border border-gray-200 overflow-hidden">
                <div class="bg-red-600 text-white font-bold text-sm px-4 py-3 uppercase tracking-wider">
                    <i class="fas fa-bars mr-2"></i> Menu Utama
                </div>
                <nav class="divide-y divide-gray-100 text-sm">
                    <a href="#" class="block px-4 py-3 bg-red-50 text-red-700 font-semibold border-l-4 border-red-600"><i class="fas fa-home w-5"></i> Beranda</a>
                    <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-gray-50 transition"><i class="fas fa-calendar-alt w-5 text-gray-400"></i> Jadwal PPDB</a>
                    <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-gray-50 transition"><i class="fas fa-file-alt w-5 text-gray-400"></i> Aturan & Prosedur</a>
                    <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-gray-50 transition"><i class="fas fa-search-location w-5 text-gray-400"></i> Cek Lokasi Rumah</a>
                    <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-gray-50 transition"><i class="fas fa-chart-bar w-5 text-gray-400"></i> Statistik Pendaftaran</a>
                </nav>
            </div>

            <div class="bg-white rounded-lg shadow-xs border border-gray-200 p-4">
                <h3 class="font-bold text-sm text-gray-900 border-b pb-2 mb-3"><i class="fas fa-lock mr-2 text-gray-500"></i> Portal Masuk</h3>
                <button class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold text-xs py-2.5 px-4 rounded shadow-xs uppercase tracking-wide transition mb-2">
                    Masuk PIN / Pendaftaran
                </button>
                <button class="w-full bg-gray-800 hover:bg-gray-900 text-white font-semibold text-xs py-2.5 px-4 rounded shadow-xs uppercase tracking-wide transition">
                    Login Operator
