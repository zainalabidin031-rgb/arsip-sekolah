</head>

<body>

<div class="card">

<h2>Portal Orang Tua</h2>

<p>Masukkan PIN:</p>

<input type="password" id="pin" placeholder="Masukkan PIN">

<div style="display:flex; gap:10px; margin-top:10px;">
    <button onclick="lihatHasil()" style="flex:1;">
        🔍 Lihat Hasil
    </button>

    <button onclick="window.location.href='index.html'" style="flex:1;">
        🏠 Home
    </button>
</div>
<div id="hasil"></div>

</div>

<script>

const API_BASE =
"https://script.google.com/macros/s/AKfycbwqhRU2shRUdBbuqdjeUt6tgd3uqbO6B9krfvf9JD0eubNNeoDZDyXBz9Iqw65xCRTjJQ/exec";

async function lihatHasil(){

    const pin =
        document.getElementById("pin").value.trim();

    if(pin===""){
        alert("Masukkan PIN.");
        return;
    }

    try{

        const resStudent =
            await fetch(API_BASE + "?sheet=students");

        const students =
            await resStudent.json();

        const siswa =
            students.find(s =>
                String(s.pin).trim() === pin
            );

        if(!siswa){

            document.getElementById("hasil").innerHTML =
                "<p><b>PIN tidak ditemukan.</b></p>";

            return;

        }

        const resResult =
            await fetch(API_BASE + "?sheet=results");

        const results =
            await resResult.json();

        const data =
            results.filter(r =>
                String(r.nama).trim() === String(siswa.nama).trim() &&
                String(r.kelas).trim() === String(siswa.kelas).trim()
            );

        let html = "";

        html += "<h3>Data Siswa</h3>";
        html += "<p><b>Nama:</b> " + siswa.nama + "</p>";
        html += "<p><b>Kelas:</b> " + siswa.kelas + "</p>";

        if(data.length===0){

            html += "<p>Belum ada hasil latihan.</p>";

            document.getElementById("hasil").innerHTML =
                html;

            return;

        }

        html += `
        <table>
            <tr>
                <th>Tanggal</th>
                <th>Mapel</th>
                <th>Bab</th>
                <th>Nilai</th>
            </tr>
        `;

        data.forEach(d=>{

            html += `
            <tr>
                <td>${d.tanggal}</td>
                <td>${d.mapel}</td>
                <td>${d.bab}</td>
                <td>${d.nilai}</td>
            </tr>
            `;

        });

        html += "</table>";

        document.getElementById("hasil").innerHTML =
            html;

    }catch(err){

        console.error(err);

        document.getElementById("hasil").innerHTML =
            "<p>Gagal mengambil data.</p>";

    }

}

</script>

</body>
</html>
