<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hasil Latihan</title>

<style>
body{
font-family:Arial;
background:#f3f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
color:#2563eb;
}
</style>

</head>

<body>

<div class="card">

<h1>🎉 Selamat!</h1>

<h2 id="nilai"></h2>

<p id="nama"></p>

<button onclick="ulang()">
Kembali ke Beranda
</button>

</div>

<script>
document.getElementById("nilai").innerText =
  "Nilai : " + (localStorage.getItem("nilai") || "-");

document.getElementById("nama").innerText =
  localStorage.getItem("nama") || "";

const API_URL =
  "https://script.google.com/macros/s/AKfycbwqhRU2shRUdBbuqdjeUt6tgd3uqbO6B9krfvf9JD0eubNNeoDZDyXBz9Iqw65xCRTjJQ/exec";

async function simpanHasil() {

  const status = document.createElement("p");
  status.id = "status";
  status.innerText = "⏳ Menyimpan hasil...";
  document.querySelector(".card").appendChild(status);

  try {

    const form = new URLSearchParams();

    form.append("nama", localStorage.getItem("nama") || "");
    form.append("kelas", localStorage.getItem("kelas") || "");
    form.append("mapel", localStorage.getItem("mapel") || "");
    form.append("bab", localStorage.getItem("bab") || "");
    form.append("nilai", localStorage.getItem("nilai") || "");

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const text = await res.text();

    status.innerText = "✅ Berhasil disimpan";

    console.log(text);

  } catch (err) {

    status.innerText = "❌ Gagal menyimpan";

    console.error(err);

  }
}

simpanHasil();

function ulang() {
  window.location.href = "index.html";
}
</script>

</script>

</body>

</html>
