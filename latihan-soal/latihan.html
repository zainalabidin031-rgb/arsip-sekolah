<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Soal</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f3f6fb;
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    margin-top:20px;
    padding:10px 20px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">

<h2 id="judul"></h2>

<p id="soal"></p>

<div id="opsi"></div>

<button onclick="berikutnya()">Soal Berikutnya</button>

</div>

<script>

const soalData = [

{
soal:"15 + 27 = ...",
pilihan:["32","42","52","37"],
jawaban:"42"
},

{
soal:"7 x 8 = ...",
pilihan:["54","56","64","48"],
jawaban:"56"
},

{
soal:"20 - 5 = ...",
pilihan:["10","15","18","20"],
jawaban:"15"
}

];

let nomor=0;
let benar=0;

tampil();

function tampil(){

document.getElementById("judul").innerText=
"Soal "+(nomor+1)+" dari "+soalData.length;

document.getElementById("soal").innerText=
soalData[nomor].soal;

let html="";

soalData[nomor].pilihan.forEach(p=>{

html+=`
<label>
<input type="radio" name="jawab" value="${p}">
${p}
</label><br><br>
`;

});

document.getElementById("opsi").innerHTML=html;

}

function berikutnya(){

const pilih=document.querySelector('input[name="jawab"]:checked');

if(!pilih){
alert("Pilih jawaban terlebih dahulu.");
return;
}

if(pilih.value===soalData[nomor].jawaban){
benar++;
}

nomor++;

if(nomor>=soalData.length){

const nilai=Math.round((benar/soalData.length)*100);

localStorage.setItem("nilai",nilai);

window.location.href="hasil.html";

return;

}

tampil();

}

</script>

</body>
</html>
