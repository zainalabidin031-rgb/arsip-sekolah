<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Soal</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f3f6fb;
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    margin-top:20px;
    padding:10px 20px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">

<h2 id="judul"></h2>

<p id="soal"></p>

<div id="opsi"></div>

<button onclick="berikutnya()">Soal Berikutnya</button>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwqhRU2shRUdBbuqdjeUt6tgd3uqbO6B9krfvf9JD0eubNNeoDZDyXBz9Iqw65xCRTjJQ/exec";

let soalData = [];
let nomor = 0;
let benar = 0;

async function loadSoal() {

    try {

        const response = await fetch(API_URL);
        const data = await response.json();

        const kelasSiswa = String(localStorage.getItem("kelas")).trim();

soalData = data
    .filter(item => String(item.kelas).trim() === kelasSiswa)
    .map(item => {

        const pilihan = [
            String(item.opsi_a),
            String(item.opsi_b),
            String(item.opsi_c),
            String(item.opsi_d)
        ];

        let jawabanBenar = "";

        switch (String(item.jawaban).trim().toUpperCase()) {
            case "A":
                jawabanBenar = pilihan[0];
                break;
            case "B":
                jawabanBenar = pilihan[1];
                break;
            case "C":
                jawabanBenar = pilihan[2];
                break;
            case "D":
                jawabanBenar = pilihan[3];
                break;
        }

        return {
            soal: String(item.soal),
            pilihan: pilihan,
            jawaban: jawabanBenar
        };

    });

        if (soalData.length === 0) {
            alert("Tidak ada soal.");
            return;
        }

        tampil();

    } catch (err) {

        console.error(err);
        alert("Gagal mengambil soal.");

    }

}

function tampil() {

    document.getElementById("judul").innerText =
        "Soal " + (nomor + 1) + " dari " + soalData.length;

    document.getElementById("soal").innerText =
        soalData[nomor].soal;

    let html = "";

    soalData[nomor].pilihan.forEach(function(p) {

        html += `
            <label>
                <input type="radio" name="jawab" value="${p}">
                ${p}
            </label>
            <br><br>
        `;

    });

    document.getElementById("opsi").innerHTML = html;

}

function berikutnya() {

    const pilih = document.querySelector('input[name="jawab"]:checked');

    if (!pilih) {
        alert("Pilih jawaban terlebih dahulu.");
        return;
    }

    if (pilih.value === soalData[nomor].jawaban) {
        benar++;
    }

    nomor++;

    if (nomor >= soalData.length) {

        const nilai = Math.round((benar / soalData.length) * 100);

        localStorage.setItem("nilai", nilai);

        window.location.href = "hasil.html";
        return;
    }

    tampil();

}

loadSoal();

</script>

</script>

</body>
</html>
