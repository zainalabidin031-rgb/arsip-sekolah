<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Bab | Latihan Soal Online</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --accent-color: #2563eb;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f4f8fc;
            --shadow-card: 0 10px 25px rgba(37, 99, 235, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: var(--primary-gradient);
            color: white;
            text-align: center;
            padding: 45px 20px;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
            flex: 1;
            width: 100%;
        }

        /* CARD INDENTITAS SISWA */
        .info {
            background: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 35px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(37, 99, 235, 0.06);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-block .label {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .info-block .value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        #nama {
            color: var(--accent-color);
        }

        /* GRID CARDS BAB */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16.5px;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(37, 99, 235, 0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: transparent;
            transition: background 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.1);
            background-color: #fafdff;
            color: var(--accent-color);
        }

        .card:hover::before {
            background: var(--primary-gradient);
        }

        .card-icon {
            font-size: 22px;
            flex-shrink: 0;
        }

        /* STATUS LOADING / KOSONG */
        .status-msg {
            grid-column: span 2;
            text-align: center;
            padding: 40px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 25px;
            color: var(--text-muted);
            font-size: 13.5px;
            font-weight: 500;
            background: white;
            border-top: 1px solid #e2e8f0;
            margin-top: 40px;
        }

        @media (max-width: 650px) {
            .info {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 20px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>📖 Pilih Bab</h1>
</header>

<div class="container">

    <div class="info">
        <div class="info-block">
            <span class="label">Nama Peserta Didik</span>
            <span class="value" id="nama">-</span>
        </div>
        <div class="info-block">
            <span class="label">Mata Pelajaran</span>
            <span class="value" id="mapel">-</span>
        </div>
        <div class="info-block">
            <span class="label">Tingkat Kelas</span>
            <span class="value" id="kelas">-</span>
        </div>
    </div>

    <div class="grid" id="daftarBab">
        <div class="status-msg" style="color: var(--accent-color);">
            <i class="fa-solid fa-circle-notch fa-spin me-2"></i> Mengambil daftar susunan materi bab pembelajaran...
        </div>
    </div>

</div>

<footer>
    © 2026 Latihan Soal Online
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwqhRU2shRUdBbuqdjeUt6tgd3uqbO6B9krfvf9JD0eubNNeoDZDyXBz9Iqw65xCRTjJQ/exec";

const nama = localStorage.getItem("nama") || "-";
const mapel = localStorage.getItem("mapel") || "-";
const kelas = localStorage.getItem("kelas") || "-";

document.getElementById("nama").textContent = nama;
document.getElementById("mapel").textContent = mapel;
document.getElementById("kelas").textContent = kelas;

async function loadBab() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        // Ambil bab yang sesuai mapel & kelas secara unik (no-duplicate)
        const babSet = new Set();

        data.forEach(item => {
            if (
                item.mapel === mapel &&
                String(item.kelas) === String(kelas)
            ) {
                babSet.add(item.bab);
            }
        });

        const daftarBab = [...babSet];
        const container = document.getElementById("daftarBab");
        container.innerHTML = "";

        if (daftarBab.length === 0) {
            container.innerHTML = `
                <div class="status-msg">
                    <i class="fa-solid fa-folder-open style="font-size:32px; display:block; margin-bottom:10px; color:#cbd5e1;"></i>
                    Belum ada bab yang tersedia untuk mata pelajaran dan kelas ini.
                </div>`;
            return;
        }

        daftarBab.forEach(bab => {
            const card = document.createElement("div");
            card.className = "card";
            
            // Membuat struktur isi kartu yang elegan menggunakan ikon folder/buku bergaya premium
            card.innerHTML = `
                <span class="card-icon">📘</span>
                <span>${bab}</span>
            `;

            card.onclick = () => {
                localStorage.setItem("bab", bab);
                window.location.href = "latihan.html";
            };

            container.appendChild(card);
        });

    } catch (err) {
        console.error(err);
        document.getElementById("daftarBab").innerHTML = `
            <div class="status-msg" style="color: #ef4444;">
                <i class="fa-solid fa-circle-xmark"></i> Gagal memuat daftar bab. Cek sambungan cloud spreadsheet Anda.
            </div>`;
    }
}

loadBab();
</script>

</body>
</html>
