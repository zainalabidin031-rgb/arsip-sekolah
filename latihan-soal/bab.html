<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Bab</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f6fb;
}

header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.info{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    line-height:1.8;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
    transition:.2s;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 6px 16px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<header>
    <h1>📖 Pilih Bab</h1>
</header>

<div class="container">

    <div class="info">
        <strong>Nama:</strong> <span id="nama"></span><br>
        <strong>Mata Pelajaran:</strong> <span id="mapel"></span><br>
        <strong>Kelas:</strong> <span id="kelas"></span>
    </div>

    <div class="grid" id="daftarBab"></div>

    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwqhRU2shRUdBbuqdjeUt6tgd3uqbO6B9krfvf9JD0eubNNeoDZDyXBz9Iqw65xCRTjJQ/exec";

const nama = localStorage.getItem("nama") || "-";
const mapel = localStorage.getItem("mapel") || "-";
const kelas = localStorage.getItem("kelas") || "-";

document.getElementById("nama").textContent = nama;
document.getElementById("mapel").textContent = mapel;
document.getElementById("kelas").textContent = kelas;

async function loadBab() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        // Ambil bab yang sesuai mapel & kelas
        const babSet = new Set();

        data.forEach(item => {
            if (
                item.mapel === mapel &&
                String(item.kelas) === String(kelas)
            ) {
                babSet.add(item.bab);
            }
        });

        const daftarBab = [...babSet];
        const container = document.getElementById("daftarBab");
        container.innerHTML = "";

        if (daftarBab.length === 0) {
            container.innerHTML =
                "<p>Belum ada bab yang tersedia untuk mata pelajaran dan kelas ini.</p>";
            return;
        }

        daftarBab.forEach(bab => {
            const card = document.createElement("div");
            card.className = "card";
            card.textContent = "📘 " + bab;

            card.onclick = () => {
                localStorage.setItem("bab", bab);
                window.location.href = "latihan.html";
            };

            container.appendChild(card);
        });

    } catch (err) {
        console.error(err);
        alert("Gagal memuat daftar bab.");
    }
}

loadBab();
</script>

</body>
</html>
