<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Nilai Siswa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #e6f2ff 0%, #cce6ff 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #2b3d52;
      min-height: 100vh;
      padding-bottom: 50px;
    }
    .navbar-custom {
      background: linear-gradient(135deg, #0056b3, #0080ff);
      box-shadow: 0 4px 12px rgba(0, 86, 179, 0.15);
      border-radius: 0 0 16px 16px;
    }
    .btn-home {
      background-color: rgba(255, 255, 255, 0.2);
      color: white !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .btn-home:hover {
      background-color: white;
      color: #0056b3 !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .card-custom {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      padding: 25px;
      margin-bottom: 25px;
    }
    .form-label {
      font-weight: 600;
      color: #004085;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .form-control, .form-select {
      border: 1.5px solid #b3d7ff;
      border-radius: 10px;
      padding: 11px 15px;
      font-size: 14px;
    }
    .table-container {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      border: 1px solid #e1e8ed;
    }
    .table thead {
      background-color: #0056b3;
      color: white;
    }
    .table th {
      padding: 16px;
      font-weight: 600;
    }
    .table td {
      padding: 16px;
    }
    .badge-kelas {
      background-color: #e6f2ff;
      color: #0056b3;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
    }
    .loader-box {
      padding: 50px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-custom py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand mb-0 h1 fw-bold text-white fs-5">
        <i class="fa-solid fa-graduation-cap me-2"></i> MONITORING NILAI SISWA
      </span>
      <a href="https://sdnbutoh1ngasem.my.id" target="_top" class="btn btn-home px-3 py-2">
        <i class="fa-solid fa-house me-1"></i> Beranda Sekolah
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="card-custom">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label"><i class="fa-solid fa-user me-1"></i> CARI NAMA SISWA</label>
          <input type="text" id="searchNama" class="form-control" placeholder="Ketik nama untuk mencari..." onkeyup="filterData()">
        </div>
        <div class="col-md-4">
          <label class="form-label"><i class="fa-solid fa-school me-1"></i> FILTER KELAS</label>
          <select id="filterKelas" class="form-select" onchange="filterData()">
            <option value="">-- Semua Kelas --</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label"><i class="fa-solid fa-book me-1"></i> MATA PELAJARAN</label>
          <select id="filterMapel" class="form-select" onchange="filterData()">
            <option value="">-- Semua Mapel --</option>
          </select>
        </div>
      </div>
    </div>

    <div class="table-container p-2">
      <div id="loading" class="loader-box">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <p class="text-muted mb-0 fw-medium">Menghubungkan & memuat data spreadsheet...</p>
      </div>
      
      <div class="table-responsive" id="tableWrapper" style="display: none;">
        <table class="table align-middle table-hover">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nama Siswa</th>
              <th>Kelas</th>
              <th>Mata Pelajaran</th>
              <th>Bab</th>
              <th class="text-center" style="width: 100px;">Nilai</th>
            </tr>
          </thead>
          <tbody id="tabelBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let masterData = [];

    document.addEventListener("DOMContentLoaded", function() {
      function ambilData() {
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler(function(data) {
              masterData = data;
              if (data.length === 0) {
                document.getElementById("loading").innerHTML = "<p class='text-danger fw-bold py-3'>Koneksi sukses, tetapi data kosong. Pastikan nama tab sheet terbawah Anda adalah 'results' dan kolom nama terisi.</p>";
                return;
              }
              isiDropdown(data);
              renderTabel(data);
              document.getElementById("loading").style.display = "none";
              document.getElementById("tableWrapper").style.display = "block";
            })
            .withFailureHandler(function(error) {
              document.getElementById("loading").innerHTML = "<div class='alert alert-danger mx-auto' style='max-width:500px;'><strong>Gagal Memuat Data!</strong><br>" + error.message + "<br><br><small>Petunjuk: Coba klik tombol 'Jalankan' (Run) di Google Apps Script untuk memberikan izin akses akun Anda.</small></div>";
            })
            .getDataSiswa();
        } else {
          setTimeout(ambilData, 300);
        }
      }
      ambilData();
    });

    function isiDropdown(data) {
      let kelasSet = new Set();
      let mapelSet = new Set();
      data.forEach(item => {
        if(item.kelas && item.kelas !== "-") kelasSet.add(item.kelas);
        if(item.mapel && item.mapel !== "-") mapelSet.add(item.mapel);
      });
      let selectKelas = document.getElementById("filterKelas");
      Array.from(kelasSet).sort().forEach(k => { selectKelas.options[selectKelas.options.length] = new Option(k, k); });
      let selectMapel = document.getElementById("filterMapel");
      Array.from(mapelSet).sort().forEach(m => { selectMapel.options[selectMapel.options.length] = new Option(m, m); });
    }

    function renderTabel(data) {
      let html = "";
      if (data.length === 0) {
        html = `<tr><td colspan="6" class="text-center text-muted py-4">Data tidak ditemukan</td></tr>`;
      } else {
        data.forEach(item => {
          html += `
            <tr>
              <td class="text-secondary"><small>${item.tanggal}</small></td>
              <td class="fw-semibold">${item.nama}</td>
              <td><span class="badge badge-kelas">${item.kelas}</span></td>
              <td>${item.mapel}</td>
              <td class="text-muted">${item.bab}</td>
              <td class="text-center fw-bold text-success fs-5">${item.nilai}</td>
            </tr>
          `;
        });
      }
      document.getElementById("tabelBody").innerHTML = html;
    }

    function filterData() {
      let keyword = document.getElementById("searchNama").value.toLowerCase();
      let kelasVal = document.getElementById("filterKelas").value;
      let mapelVal = document.getElementById("filterMapel").value;
      let dataTerfilter = masterData.filter(item => {
        let matchNama = item.nama.toLowerCase().includes(keyword);
        let matchKelas = kelasVal === "" || item.kelas === kelasVal;
        let matchMapel = mapelVal === "" || item.mapel === mapelVal;
        return matchNama && matchKelas && matchMapel;
      });
      renderTabel(dataTerfilter);
    }
  </script>
</body>
</html>
