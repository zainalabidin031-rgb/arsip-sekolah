<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identitas Siswa</title>
<link rel="icon" type="image/png" href="../assets/favicon.png?v=1">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#fff;
    width:90%;
    max-width:500px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:15px;
}

.info{
    text-align:center;
    margin-bottom:25px;
    color:#555;
}

.info strong{
    color:#111;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="card">

    <h1>👤 Identitas Siswa</h1>

    <div class="info">
        Mata Pelajaran: <strong id="mapel"></strong><br>
        Kelas: <strong id="kelas"></strong>
    </div>

    <label>Nama Lengkap</label>
    <input
        type="text"
        id="nama"
        placeholder="Masukkan nama lengkap"
        autocomplete="off"
    >

    <button onclick="lanjut()">Lanjut ke Pilih Bab</button>

</div>

<script>
document.getElementById("mapel").textContent =
    localStorage.getItem("mapel") || "-";

document.getElementById("kelas").textContent =
    localStorage.getItem("kelas") || "-";

function lanjut(){

    const nama = document.getElementById("nama").value.trim();

    if(nama === ""){
        alert("Silakan masukkan nama terlebih dahulu.");
        return;
    }

    localStorage.setItem("nama", nama);

    // menuju halaman pilih bab
    window.location.href = "bab.html";
}
</script>

</body>
</html>
