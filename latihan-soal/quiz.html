<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Interaktif Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #00d2ff 0%, #0066ff 60%, #7928ca 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .left-panel {
            flex: 2;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .right-panel {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            padding: 30px;
            overflow-y: auto;
            color: white;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .materi-badge {
            align-self: flex-start;
            background: linear-gradient(45deg, #7928ca, #0066ff);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .pertanyaan {
            font-size: 1.3rem;
            color: #1e293b;
            font-weight: 600;
            line-height: 1.6;
        }

        .pilihan-jawaban {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opsi {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            color: #334155;
            font-weight: 500;
        }

        .opsi:hover:not(.disabled) {
            border-color: #0066ff;
            background-color: #f0f7ff;
            color: #0066ff;
        }

        .opsi input {
            margin-right: 15px;
            accent-color: #0066ff;
            scale: 1.2;
        }

        .opsi.disabled { cursor: not-allowed; opacity: 0.7; }
        .opsi.benar { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46 !important; }
        .opsi.salah { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; }

        .notif-box { padding: 15px; border-radius: 10px; font-weight: 600; display: none; align-items: center; gap: 10px; }
        .notif-box.sukses { background-color: #d1fae5; color: #065f46; display: flex; }
        .notif-box.gagal { background-color: #fee2e2; color: #991b1b; display: flex; }

        .nav-soal { display: flex; gap: 15px; margin-top: 10px; align-items: center; }
        .btn-nav { background: #e2e8f0; color: #334155; border: none; padding: 10px 20px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-nav:hover { background: #cbd5e1; }
        .btn-kirim { background: linear-gradient(45deg, #0066ff, #7928ca); color: white; border: none; padding: 12px 25px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-left: auto; }

        .right-panel h3 { font-size: 1.4rem; margin-bottom: 20px; color: #00d2ff; border-bottom: 2px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px; }
        .daftar-soal-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; list-style: none; }
        
        .nomor-kotak { background: rgba(255, 255, 255, 0.1); padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: white; position: relative; }
        .nomor-kotak.aktif { background: #0066ff; font-weight: bold; box-shadow: 0 0 10px #00d2ff; }
        .nomor-kotak.sudah-benar { background: #10b981; }
        .nomor-kotak.sudah-salah { background: #ef4444; }

        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; height: 95vh; }
            .left-panel, .right-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <span class="materi-badge" id="materiBadge">Memuat Soal...</span>
            
            <div style="margin-bottom: 5px;">
                <label style="font-weight: bold; color: #334155;">Nama Siswa: </label>
                <input type="text" id="namaSiswa" value="Budi Santoso" style="padding: 5px 10px; border-radius: 5px; border: 1px solid #cbd5e1;">
            </div>

            <div class="pertanyaan" id="teksPertanyaan">Sedang mengambil soal dari Jakarta...</div>
            
            <div class="pilihan-jawaban" id="areaJawaban"></div>

            <div id="notif" class="notif-box"></div>

            <div class="nav-soal">
                <button class="btn-nav" onclick="soalSebelumnya()">◀ Sebelum</button>
                <button class="btn-nav" onclick="soalBerikutnya()">Sesudah ▶</button>
                <button class="btn-kirim" onclick="kirimKeSpreadsheet()">Selesai & Kirim</button>
            </div>
        </div>
        
        <div class="right-panel">
            <h3 id="judulKanan">Nomor Soal (0/35)</h3>
            <div class="daftar-soal-nav" id="navigasiNomor"></div>
        </div>
    </div>

    <script>
        // --- PENGATURAN UTAMA ---
        const SPREADSHEET_ID = 'spreadsheets/d/1UUrz7vn_EqYuI-xu0UKn1lyu3VLse2xxSEVZmces--s';
        const SHEET_NAME = 'Sheet1';
        const BATAS_SOAL = 35; // Batasi soal kuis yang muncul
        
        const URL_DATA = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        let daftarSoal = [];
        let indeksSekarang = 0;
        let statusJawabanSiswa = [];

        // --- SISTEM AUDIO OTOMATIS (Tanpa File MP3) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function mainkanSuara(tipe) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (tipe === 'benar') {
                // Tuling-tuling (Dua nada tinggi berurutan)
                bunyikanNada(523.25, 0.1, 0);       // Nada Do tinggi
                bunyikanNada(659.25, 0.15, 0.1);    // Nada Mi tinggi
            } else {
                // Tet-tet (Dua nada rendah patah-patah)
                bunyikanNada(150, 0.15, 0);
                bunyikanNada(150, 0.15, 0.2);
            }
        }
        function bunyikanNada(frekuensi, durasi, tunda) {
            setTimeout(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(frekuensi, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + durasi);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + durasi);
            }, tunda * 1000);
        }

        // --- AMBIL & ACAK SOAL ---
        fetch(URL_DATA)
            .then(res => res.text())
            .then(data => {
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                let semuaSoal = rows.map(row => ({
                    materi: row.c[0]?.v || "Umum",
                    pertanyaan: row.c[1]?.v || "",
                    A: row.c[2]?.v || "", B: row.c[3]?.v || "", C: row.c[4]?.v || "", D: row.c[5]?.v || "",
                    kunci: row.c[6]?.v || ""
                }));

                // Algoritma Pengacakan Soal (Fisher-Yates)
                for (let i = semuaSoal.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [semuaSoal[i], semuaSoal[j]] = [semuaSoal[j], semuaSoal[i]];
                }

                // Ambil 35 Soal Teratas saja setelah diacak
                daftarSoal = semuaSoal.slice(0, BATAS_SOAL);
                statusJawabanSiswa = new Array(daftarSoal.length).fill(null);

                tampilkanSoal();
                buatNavigasiNomor();
                updateProgressJudul();
            })
            .catch(err => {
                document.getElementById('teksPertanyaan').innerText = "Gagal memuat soal. Periksa koneksi atau ID spreadsheet.";
            });

        function tampilkanSoal() {
            if (daftarSoal.length === 0) return;
            const soal = daftarSoal[indeksSekarang];
            document.getElementById('materiBadge').innerText = `${soal.materi} - No. ${indeksSekarang + 1} dari ${daftarSoal.length}`;
            document.getElementById('teksPertanyaan').innerText = soal.pertanyaan;

            const areaJawaban = document.getElementById('areaJawaban');
            document.getElementById('notif').style.display = 'none';

            let htmlOpsi = '';
            ['A', 'B', 'C', 'D'].forEach(huruf => {
                htmlOpsi += `
                    <label class="opsi" data-huruf="${huruf}" onclick="cekJawaban(this)">
                        <input type="radio" name="pilihan" ${statusJawabanSiswa[indeksSekarang]?.terpilih === huruf ? 'checked' : ''}> 
                        ${huruf}. ${soal[huruf]}
                    </label>
                `;
            });
            areaJawaban.innerHTML = htmlOpsi;

            if (statusJawabanSiswa[indeksSekarang] !== null) {
                kunciJawabanSelesai(statusJawabanSiswa[indeksSekarang].terpilih, false);
            }

            document.querySelectorAll('.nomor-kotak').forEach((kotak, i) => {
                if(i === indeksSekarang) kotak.classList.add('aktif');
                else kotak.classList.remove('aktif');
            });
        }

        function cekJawaban(elemenTerpilih) {
            if (statusJawabanSiswa[indeksSekarang] !== null) return;

            const hurufTerpilih = elemenTerpilih.getAttribute('data-huruf');
            const kunciBenar = daftarSoal[indeksSekarang].kunci;
            const isBenar = (hurufTerpilih === kunciBenar);

            statusJawabanSiswa[indeksSekarang] = { terpilih: hurufTerpilih, benar: isBenar };

            // Warnai nomor kotak menu kanan secara permanen (Hijau/Merah)
            const kotakNomor = document.querySelectorAll('.nomor-kotak')[indeksSekarang];
            if(isBenar) {
                kotakNomor.classList.add('sudah-benar');
                mainkanSuara('benar');
            } else {
                kotakNomor.classList.add('sudah-salah');
                mainkanSuara('salah');
            }

            kunciJawabanSelesai(hurufTerpilih, true);
            updateProgressJudul();
        }

        function kunciJawabanSelesai(hurufTerpilih, suaraAktif) {
            const semuaOpsi = document.querySelectorAll('.opsi');
            const kunciBenar = daftarSoal[indeksSekarang].kunci;
            const notif = document.getElementById('notif');

            semuaOpsi.forEach(opsi => {
                opsi.classList.add('disabled');
                const hurufOpsi = opsi.getAttribute('data-huruf');
                if (hurufOpsi === kunciBenar) opsi.classList.add('benar');
                if (hurufOpsi === hurufTerpilih && hurufTerpilih !== kunciBenar) opsi.classList.add('salah');
            });

            if (hurufTerpilih === kunciBenar) {
                notif.innerHTML = "<span>&#10004;</span> <b>Jawaban BENAR! 🎉</b>";
                notif.className = "notif-box sukses";
            } else {
                notif.innerHTML = `<span>&#10006;</span> <b>SALAH! Kunci yang benar adalah ${kunciBenar}.</b>`;
                notif.className = "notif-box gagal";
            }
        }

        function buatNavigasiNomor() {
            const nav = document.getElementById('navigasiNomor');
            nav.innerHTML = '';
            daftarSoal.forEach((_, i) => {
                nav.innerHTML += `<div class="nomor-kotak" onclick="lompatKeSoal(${i})">${i + 1}</div>`;
            });
        }

        function updateProgressJudul() {
            const totalDijawab = statusJawabanSiswa.filter(j => j !== null).length;
            document.getElementById('judulKanan').innerText = `Nomor Soal (${totalDijawab}/${daftarSoal.length})`;
        }

        function lompatKeSoal(indeks) { indeksSekarang = indeks; tampilkanSoal(); }
        function soalSebelumnya() { if (indeksSekarang > 0) { indeksSekarang--; tampilkanSoal(); } }
        function soalBerikutnya() { if (indeksSekarang < daftarSoal.length - 1) { indeksSekarang++; tampilkanSoal(); } }

        function kirimKeSpreadsheet() {
    const nama = document.getElementById('namaSiswa').value;
    const totalDijawab = statusJawabanSiswa.filter(j => j !== null).length;
    const totalBenar = statusJawabanSiswa.filter(j => j && j.benar).length;
    const skorAkhir = Math.round((totalBenar / daftarSoal.length) * 100);

    if (totalDijawab < daftarSoal.length) {
        const yakin = confirm(`Peringatan: Kamu baru menjawab ${totalDijawab} dari ${daftarSoal.length} soal. Tetap kirim nilai?`);
        if (!yakin) return;
    }

    // --- PASTE URL GOOGLE APPS SCRIPT ANDA DI SINI ---
    const URL_PENGIRIMAN = "https://script.google.com/macros/s/AKfycbwb_HqmmAdr1FRy9jR5UzIn2Fagu0DbiwwyLQ9h7e5FgYuIGBoYcGIyI1X-Zom2SG-V/exec";

    // Proses pengiriman data ke spreadsheet di latar belakang
    fetch(URL_PENGIRIMAN, {
        method: "POST",
        body: JSON.stringify({
            nama: nama,
            skor: skorAkhir,
            benar: totalBenar
        })
    })
    .then(res => res.json())
    .then(hasil => {
        if(hasil.status === "sukses") {
            alert(`Selesai! Skor Akhir ${nama}: ${skorAkhir}\nData berhasil disimpan ke Spreadsheet Guru!`);
        } else {
            alert("Aduh, nilai gagal terkirim ke server. Coba lagi.");
        }
    })
    .catch(err => {
        alert("Terjadi gangguan koneksi saat mengirim nilai.");
        console.error(err);
    });
}
    </script>
</body>
</html>
