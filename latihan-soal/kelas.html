<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Kelas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f6fb;
}

header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:30px 20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px 20px;
}

.info{
    text-align:center;
    font-size:20px;
    margin-bottom:30px;
}

.info span{
    color:#2563eb;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:35px;
    text-align:center;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    font-size:24px;
    font-weight:bold;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 18px rgba(0,0,0,.15);
}

.kembali{
    display:inline-block;
    margin-bottom:25px;
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:25px;
    color:#666;
}
</style>

</head>
<body>

<header>
    <h1>🏫 Pilih Kelas</h1>
</header>

<div class="container">

    <a href="index.html" class="kembali">← Kembali ke Mata Pelajaran</a>

    <div class="info">
        Mata Pelajaran:
        <span id="namaMapel">-</span>
    </div>

    <div class="grid">

        <div class="card" onclick="pilihKelas('1')">Kelas 1</div>
        <div class="card" onclick="pilihKelas('2')">Kelas 2</div>
        <div class="card" onclick="pilihKelas('3')">Kelas 3</div>
        <div class="card" onclick="pilihKelas('4')">Kelas 4</div>
        <div class="card" onclick="pilihKelas('5')">Kelas 5</div>
        <div class="card" onclick="pilihKelas('6')">Kelas 6</div>

    </div>

</div>

<footer>
    © 2026 Latihan Soal Online
</footer>

<script>
const mapel = localStorage.getItem("mapel");

if (!mapel) {
    // Jika belum memilih mapel, kembali ke beranda
    window.location.href = "index.html";
}

document.getElementById("namaMapel").textContent = mapel;

function pilihKelas(kelas){
    localStorage.setItem("kelas", kelas);

    // Lanjut ke halaman pilih bab
    window.location.href = "identitas.html";
}
</script>

</body>
</html>
