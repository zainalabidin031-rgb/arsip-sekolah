<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Nilai Latihan Siswa - SDN Butoh 1 Ngasem</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-color: #1b5e20;
      --secondary-color: #2e7d32;
      --accent-color: #81c784;
      --background-color: #f4f7f5;
      --text-color: #333333;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--background-color); color: var(--text-color); line-height: 1.6; padding: 20px; }
    .container { max-width: 800px; margin: 30px auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; }
    .header h2 { color: var(--primary-color); font-weight: 600; font-size: 24px; }
    .header p { color: #666; font-size: 14px; }
    .search-box { margin-bottom: 25px; }
    .form-group { display: flex; gap: 10px; }
    input[type="text"] { flex: 1; padding: 12px 15px; border: 2px solid #ddd; border-radius: 6px; font-size: 15px; font-family: inherit; }
    input[type="text"]:focus { border-color: var(--primary-color); outline: none; }
    button { background-color: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; }
    button:hover { background-color: var(--secondary-color); }
    button:disabled { background-color: #cccccc; cursor: not-allowed; }
    .loader { display: none; text-align: center; margin: 20px 0; color: var(--primary-color); }
    .message { padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; font-size: 14px; }
    .message.error { background-color: #ffebee; color: #c62828; border-left: 5px solid #c62828; }
    .result-container { margin-top: 20px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th { background-color: var(--primary-color); color: white; text-align: left; padding: 12px; font-weight: 600; }
    td { padding: 12px; border-bottom: 1px solid #ddd; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .badge-nilai { background-color: var(--secondary-color); color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    @media (max-width: 600px) { .form-group { flex-direction: column; } button { width: 100%; } th, td { padding: 8px; font-size: 13px; } }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h2><i class="fa-solid fa-graduation-cap"></i> CEK NILAI LATIHAN</h2>
      <p>SDN Butoh 1 Ngasem</p>
    </div>

    <div class="search-box">
      <div class="form-group">
        <input type="text" id="searchName" placeholder="Masukkan Nama Lengkap Siswa..." autocomplete="off">
        <button id="btnCari" onclick="cariNilai()"><i class="fa-solid fa-magnifying-glass"></i> Cari</button>
      </div>
    </div>

    <div id="loader" class="loader">
      <i class="fa-solid fa-spinner fa-spin fa-2xl"></i> <p style="margin-top:10px;">Sedang mengambil data...</p>
    </div>

    <div id="msgBox" class="message"></div>

    <div id="resultArea" class="result-container" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Mapel</th>
            <th>Bab</th>
            <th>Nilai</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // MASUKKAN URL WEB APP APPS SCRIPT ANDA DI SINI
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwArzoK-jJk96yKM4IRAm3TlP39njzvy71oPCuMJQd54Z1Yhf-aFNToqH_J9O5QwGspkQ/exec";

    document.getElementById("searchName").addEventListener("keypress", function(event) {
      if (event.key === "Enter") cariNilai();
    });

    function cariNilai() {
      var nameInput = document.getElementById("searchName").value;
      var btn = document.getElementById("btnCari");
      var loader = document.getElementById("loader");
      var msgBox = document.getElementById("msgBox");
      var resultArea = document.getElementById("resultArea");
      var resultBody = document.getElementById("resultBody");

      if (nameInput.trim() === "") {
        showMsg("Silakan masukkan nama siswa terlebih dahulu.", "error");
        return;
      }

      msgBox.style.display = "none";
      resultArea.style.display = "none";
      resultBody.innerHTML = "";
      loader.style.display = "block";
      btn.disabled = true;

      // Mengambil data dari Google Apps Script menggunakan fetch API
      fetch(`${WEB_APP_URL}?nama=${encodeURIComponent(nameInput)}`)
        .then(response => response.json())
        .then(response => {
          loader.style.display = "none";
          btn.disabled = false;

          if (response.success) {
            response.data.forEach(function(row) {
              var tr = document.createElement("tr");
              tr.innerHTML = `<td>${row.tanggal}</td>
                              <td>${row.nama}</td>
                              <td>${row.kelas}</td>
                              <td>${row.mapel}</td>
                              <td>${row.bab}</td>
                              <td><span class='badge-nilai'>${row.nilai}</span></td>`;
              resultBody.appendChild(tr);
            });
            resultArea.style.display = "block";
          } else {
            showMsg(response.message, "error");
          }
        })
        .catch(error => {
          loader.style.display = "none";
          btn.disabled = false;
          showMsg("Gagal memuat data dari server. Pastikan URL Apps Script sudah benar.", "error");
          console.error(error);
        });
    }

    function showMsg(text, type) {
      var msgBox = document.getElementById("msgBox");
      msgBox.innerText = text;
      msgBox.className = "message " + type;
      msgBox.style.display = "block";
    }
  </script>
</body>
</html>
