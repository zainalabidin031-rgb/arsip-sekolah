<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CBT Latihan Siswa</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:8px}
select,input,button{width:100%;padding:10px;margin:8px 0}
.soal{border:1px solid #ddd;padding:15px;margin:15px 0;border-radius:6px}
</style>
</head>
<body>
<div class="container">
<h2>CBT Latihan Siswa</h2>

<div id="awal">
<input id="nama" placeholder="Nama Lengkap">

<select id="mapel"></select>
<select id="kelas"></select>
<select id="bab"></select>

<button onclick="mulai()">Mulai Ujian</button>
</div>

<div id="ujian" style="display:none">
<div id="soal"></div>
<button onclick="selesai()">Selesai</button>
</div>

<div id="hasil" style="display:none;text-align:center">
<h2>Nilai Anda</h2>
<h1 id="nilai">0</h1>
</div>

<script>
let soal=[];

google.script.run.withSuccessHandler(function(f){
  isi("mapel",f.mapel);
  isi("kelas",f.kelas);
  isi("bab",f.bab);
}).ambilFilter();

function isi(id,data){
  const s=document.getElementById(id);
  s.innerHTML="";
  data.forEach(v=>{
    s.innerHTML+=`<option value="${v}">${v}</option>`;
  });
}

function mulai(){

 const nama=document.getElementById("nama").value.trim();

 if(!nama){
   alert("Masukkan nama");
   return;
 }

 google.script.run
 .withSuccessHandler(function(data){

   soal=data;

   document.getElementById("awal").style.display="none";
   document.getElementById("ujian").style.display="block";

   let h="";

   data.forEach((s,i)=>{

     h+=`
     <div class="soal">
       <b>${i+1}. ${s.soal}</b>
       ${s.gambar?'<br><img src="'+s.gambar+'" style="max-width:100%">':""}
       <p><label><input type="radio" name="s${i}" value="A"> A. ${s.a}</label></p>
       <p><label><input type="radio" name="s${i}" value="B"> B. ${s.b}</label></p>
       <p><label><input type="radio" name="s${i}" value="C"> C. ${s.c}</label></p>
       <p><label><input type="radio" name="s${i}" value="D"> D. ${s.d}</label></p>
     </div>`;
   });

   document.getElementById("soal").innerHTML=h;

 })
 .withFailureHandler(e=>alert(e.message))
 .ambilSoal(
   mapel.value,
   kelas.value,
   bab.value
 );
}

function selesai(){

 let benar=0;

 soal.forEach((s,i)=>{
   const p=document.querySelector('input[name="s'+i+'"]:checked');
   if(p && p.value===s.kunci) benar++;
 });

 const nilai=Math.round((benar/soal.length)*100);

 google.script.run
 .withSuccessHandler(function(){

   document.getElementById("ujian").style.display="none";
   document.getElementById("hasil").style.display="block";
   document.getElementById("nilai").innerText=nilai;

 })
 .simpanNilaiSiswa(
   nama.value,
   mapel.value,
   kelas.value,
   bab.value,
   nilai
 );

}
</script>
</div>
</body>
</html>
