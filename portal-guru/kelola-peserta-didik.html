<!DOCTYPE html>
<html lang="id">
<head>

    <title>Kelola Peserta Didik</title>

    <!-- =========================
         CSS
    ========================== -->
    <style>
        /* ---------- Warna Dasar ---------- */
        :root {
            --primary: #42a5f5;
            --primary-dark: #2196f3;
            --bg: #eef7ff;
            --card: #ffffff;
            --border: #d6eeff;
            --text: #1f2937;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

            <!-- Tabel -->
