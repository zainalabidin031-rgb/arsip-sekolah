<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kelola Peserta Didik</title>
<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f3f7fc;color:#1e293b}
header{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:22px}
.container{max-width:1200px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:20px}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;align-items:center}
input, select{padding:10px 12px;border:1px solid #dbeafe;border-radius:10px;min-width:260px;box-sizing:border-box}
button{border:none;border-radius:10px;padding:10px 16px;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.secondary{background:#64748b;color:#fff}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left}
th{background:#2563eb;color:#fff}
tr:hover{background:#f8fbff}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:1000}
.modal-box{background:#fff;border-radius:14px;padding:20px;max-width:700px;width:95%;max-height:90vh;overflow-y:auto}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.grid label{display:flex;flex-direction:column;font-size:13px;font-weight:600;color:#475569}
.grid label input, .grid label select{margin-top:4px;min-width:100%}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header><h2>Kelola Peserta Didik</h2></header>

<div class="container">
<div class="card">
<div class="toolbar">
<div>
<button class="secondary" onclick="history.back()">🏠 Kembali ke Dashboard</button>
</div>
<input id="q" placeholder="Cari Nama atau NISN">
</div>
<table>
<thead><tr><th>NISN</th><th>NIS</th><th>Nama</th><th>Kelas</th><th>Status</th><th>Aksi</th></tr></thead>
<tbody id="tb"><tr><td colspan="6">Memuat...</td></tr></tbody>
</table>
</div>
</div>

<div id="modal"><div class="modal-box">
<h3>Edit Data Lengkap Siswa</h3>
<div class="grid">
  <label>NISN (Kunci Utama)<input id="nisn" disabled></label>
  <label>NIS<input id="nis" placeholder="NIS"></label>
  <label>Nama Lengkap<input id="nama" placeholder="Nama Lengkap"></label>
  <label>Kelas<input id="kelas" placeholder="Kelas"></label>
  <label>Status<input id="status" placeholder="Status"></label>
  <label>Wali Kelas<input id="waliKelas" placeholder="Nama Wali Kelas"></label>
  
  <label>Nama Ayah<input id="namaAyah" placeholder="Nama Ayah"></label>
  <label>Nama Ibu<input id="namaIbu" placeholder="Nama Ibu"></label>
  <label>Tanggal Lahir<input id="tglLahir" type="date"></label>
  <label>Jenis Kelamin
    <select id="jk">
      <option value="">-- Pilih --</option>
      <option value="L">Laki-laki</option>
      <option value="P">Perempuan</option>
    </select>
  </label>
  <label>Tempat Lahir<input id="tempatLahir" placeholder="Tempat Lahir"></label>
  <label>Tahun Masuk<input id="thnMasuk" placeholder="Contoh: 2023"></label>
  <label>Tahun Lulus<input id="thnLulus" placeholder="Contoh: 2026"></label>
  <label>Alamat Rumah<input id="alamat" placeholder="Alamat lengkap"></label>
  <label>No HP Orang Tua<input id="noHpOrangTua" placeholder="No HP Aktif"></label>
</div>
<div style="margin-top:20px; text-align:right;">
<button class="secondary" onclick="closeModal()">Batal</button>
<button class="primary" onclick="save()">Simpan Perubahan</button>
</div>
</div></div>

<script>
// SILAKAN GANTI DENGAN URL SCRIPT WEB APP BARU KAMU JIKA BERUBAH
const SCRIPT="https://script.google.com/macros/s/AKfycbyGXsz7p4zTIlQ8A9JDCMPnwPJ63pXKYtBBFHFzEryirz1s1hcW31oHCPlRZ0d2V3-l/exec";
let rows=[], current=null;
const modal = document.getElementById("modal");

async function loadData(){
 const res=await fetch(SCRIPT+"?action=list");
 const js=await res.json();
 rows=js.data||[];
 render(rows);
}

function render(data){
 const tb=document.getElementById("tb");
 tb.innerHTML=data.map(r=>`<tr>
<td>${r.NISN||""}</td><td>${r.NIS||""}</td><td>${r.Nama||""}</td>
<td>${r.Kelas||""}</td><td>${r.Status||""}</td>
<td><button class='primary' onclick='edit("${r.NISN}")'>Edit Lengkap</button></td>
</tr>`).join("")||"<tr><td colspan='6'>Tidak ada data</td></tr>";
}

document.getElementById("q").oninput=e=>{
 const s=e.target.value.toLowerCase();
 render(rows.filter(r=>(r.Nama||"").toLowerCase().includes(s)||(r.NISN||"").toLowerCase().includes(s)));
}

function edit(n){
 current=rows.find(r=>String(r.NISN)===String(n));
 
 // Reset Semua Input Form
 ["nisn","nis","nama","kelas","status","waliKelas","namaAyah","namaIbu","tglLahir","jk","tempatLahir","thnMasuk","thnLulus","alamat","noHpOrangTua"].forEach(id=>document.getElementById(id).value="");
 
 // Mengisi Form berdasarkan Header Kolom di Google Sheets secara presisi
 document.getElementById("nisn").value=current.NISN||"";
 document.getElementById("nis").value=current.NIS||"";
 document.getElementById("nama").value=current.Nama||"";
 document.getElementById("kelas").value=current.Kelas||"";
 document.getElementById("status").value=current.Status||"";
 document.getElementById("waliKelas").value=current["Wali Kelas"]||"";
 document.getElementById("namaAyah").value=current["Nama Ayah"]||"";
 document.getElementById("namaIbu").value=current["Nama Ibu"]||"";
 
 // Penanganan Format Tanggal Lahir agar masuk ke input HTML type="date"
 if(current["Tanggal Lahir"]) {
   const d = new Date(current["Tanggal Lahir"]);
   if(!isNaN(d)) document.getElementById("tglLahir").value = d.toISOString().split('T')[0];
 }
 
 document.getElementById("jk").value=current["Jenis Kelamin"]||"";
 document.getElementById("tempatLahir").value=current["Tempat Lahir"]||"";
 document.getElementById("thnMasuk").value=current["Tahun Masuk"]||"";
 document.getElementById("thnLulus").value=current["Tahun Lulus"]||"";
 document.getElementById("alamat").value=current["Alamat"]||"";
 document.getElementById("noHpOrangTua").value=current["No HP Orang Tua"]||"";
 
 modal.style.display="flex";
}

function closeModal(){modal.style.display="none";}

async function save(){
 const p=new URLSearchParams({
 action:"update",
 nisn: document.getElementById("nisn").value,
 nis: document.getElementById("nis").value,
 nama: document.getElementById("nama").value,
 kelas: document.getElementById("kelas").value,
 Status: document.getElementById("status").value, // S Besar sesuai perbaikan utama kita
 waliKelas: document.getElementById("waliKelas").value,
 namaAyah: document.getElementById("namaAyah").value,
 namaIbu: document.getElementById("namaIbu").value,
 tglLahir: document.getElementById("tglLahir").value,
 jk: document.getElementById("jk").value,
 tempatLahir: document.getElementById("tempatLahir").value,
 thnMasuk: document.getElementById("thnMasuk").value,
 thnLulus: document.getElementById("thnLulus").value,
 alamat: document.getElementById("alamat").value,
 noHpOrangTua: document.getElementById("noHpOrangTua").value
 });
 
 const res=await fetch(SCRIPT+"?"+p.toString());
 const js=await res.json();
 alert(js.message||"Selesai");
 closeModal();
 loadData();
}

loadData();
</script>
</body></html>
