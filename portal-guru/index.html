<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Guru</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:360px;
        }

        .back-btn{
            display:inline-block;
            margin-bottom:15px;
            text-decoration:none;
            color:#1565c0;
            font-weight:bold;
        }

        .card{
            background:#fff;
            border-radius:12px;
            padding:22px;
            box-shadow:0 4px 12px rgba(0,0,0,.08);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            color:#222;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:25px;
            font-size:14px;
            line-height:1.5;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:18px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2196F3;
            color:#fff;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1e88e5;
        }

        .info{
            margin-top:18px;
            font-size:13px;
            color:#777;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="container">

   <a href="../index.html" class="back-btn">🏠 Home</a>

    <div class="card">

        <h1>👨‍🏫 Portal Guru</h1>

        <p>
            Silakan masuk menggunakan akun yang diberikan oleh administrator
            sekolah untuk mengakses data internal.
        </p>

        <form id="loginForm">

            <label>Username</label>
            <input
                type="text"
                id="username"
                placeholder="Masukkan username"
                required
            >

            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Masukkan password"
                required
            >

            <button type="submit">
                🔐 Masuk
            </button>

        </form>

        <div class="info">
            Portal ini hanya untuk guru dan tenaga kependidikan yang berwenang.
        </div>

    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCxHDy6JjF4FMY16lT6hHuTrb-uLRxTscJ7-mRFJTxExDOX1pfuTmVEoq-uONsPbjp/exec";

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "login",
                username: username,
                password: password
            })
        });

        const result = await response.json();

        if (result.success) {
            localStorage.setItem("guruLogin", "true");
            localStorage.setItem("guruNama", result.nama);
            localStorage.setItem("guruRole", result.role);

            window.location.href = "dashboard.html";
        } else {
            alert("Username atau password salah.");
        }
    } catch (err) {
        alert("Terjadi kesalahan saat menghubungi server.");
        console.error(err);
    }
});

</script>

</body>
</html>
