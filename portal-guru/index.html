<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Guru | SDN Butoh 1 Ngasem</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-light: #e6f2ff;
            --primary-accent: #0077ff;
            --primary-gradient: linear-gradient(135deg, #0088ff 0%, #00c6ff 100%);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --shadow-card: 0 20px 40px rgba(0, 136, 255, 0.06);
            --shadow-input: 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(#0088ff 0.5px, transparent 0.5px), radial-gradient(#0088ff 0.5px, #f8fafc 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-opacity: 0.02; /* Sentuhan background estetik */
        }

        /* Mengakomodasi opacity background dot */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(248, 250, 252, 0.85);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: var(--primary-accent);
            transform: translateX(-3px);
            border-color: var(--primary-light);
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(0, 136, 255, 0.04);
            text-align: center;
        }

        .logo-area {
            background: var(--primary-gradient);
            color: white;
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 20px auto;
            box-shadow: 0 6px 16px rgba(0, 136, 255, 0.25);
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 13.5px;
            line-height: 1.6;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 13px 15px 13px 45px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-dark);
            background-color: #fcffff;
            box-shadow: var(--shadow-input);
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 119, 255, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary-gradient);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(0, 136, 255, 0.2);
            transition: all 0.2s ease;
            margin-top: 25px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 136, 255, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }

        .info {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            border-top: 1px dashed #e2e8f0;
            padding-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="container">

   <!-- Menggunakan trik relatif anti-buntut .html -->
   <a href="../" class="back-btn"><i class="fa-solid fa-house"></i> Beranda Sekolah</a>

    <div class="card">
        
        <div class="logo-area">
            <i class="fa-solid fa-user-shield"></i>
        </div>

        <h1>Portal Akun Guru</h1>

        <p>
            Silakan masuk menggunakan akun yang diberikan oleh administrator
            sekolah untuk mengakses data internal.
        </p>

        <form id="loginForm">

            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input
                        type="text"
                        id="username"
                        placeholder="Masukkan username"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="password"
                        placeholder="Masukkan password"
                        required
                    >
                </div>
            </div>

            <button type="submit">
                <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Portal
            </button>

        </form>

        <div class="info">
            <i class="fa-solid fa-circle-exclamation" style="color: #3b82f6; margin-right: 2px;"></i> Portal ini dilindungi dan hanya ditujukan bagi Guru & Tenaga Kependidikan SDN Butoh 1 Ngasem yang berwenang.
        </div>

    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCxHDy6JjF4FMY16lT6hHuTrb-uLRxTscJ7-mRFJTxExDOX1pfuTmVEoq-uONsPbjp/exec";

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "login",
                username: username,
                password: password
            })
        });

        const result = await response.json();

        if (result.success) {
            localStorage.setItem("guruLogin", "true");
            localStorage.setItem("guruNama", result.nama);
            localStorage.setItem("guruRole", result.role);

            window.location.href = "dashboard.html";
        } else {
            alert("Username atau password salah.");
        }
    } catch (err) {
        alert("Terjadi kesalahan saat menghubungi server.");
        console.error(err);
    }
});

</script>

</body>
</html>
