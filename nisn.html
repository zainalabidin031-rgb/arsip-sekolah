<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomor Induk Nasional SDN Butoh I Ngasem</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Header */
header{
    background:#2196F3;
    color:white;
    padding:18px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

header h1{
    font-size:24px;
}

header p{
    font-size:14px;
    margin-top:4px;
    opacity:0.95;
}

/* Tombol kembali */
.nav{
    max-width:500px;
    width:92%;
    margin:18px auto 0;
}

.back-btn{
    display:inline-block;
    text-decoration:none;
    background:#ffffff;
    color:#2196F3;
    border:2px solid #2196F3;
    padding:10px 16px;
    border-radius:10px;
    font-weight:bold;
    transition:.2s;
}

.back-btn:hover{
    background:#2196F3;
    color:#fff;
}

/* Card utama */
.container{
    width:92%;
    max-width:500px;
    margin:16px auto;
    background:#fff;
    border-radius:16px;
    padding:24px;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#444;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #d6d6d6;
    border-radius:10px;
    font-size:16px;
    margin-bottom:18px;
}

input:focus{
    outline:none;
    border-color:#2196F3;
}

button{
    width:100%;
    padding:14px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.95;
}

#hasil{
    margin-top:22px;
}

.card{
    background:#f8fbff;
    border:1px solid #dbeafe;
    border-radius:12px;
    padding:16px;
}

.card h3{
    color:#2196F3;
    margin-bottom:10px;
}

.card p{
    margin:8px 0;
}

/* Footer */
footer{
    margin-top:auto;
    background:#fff;
    color:#666;
    text-align:center;
    padding:14px;
    font-size:14px;
}
</style>

</head>
<body>

<header>
    <h1>Portal NISN</h1>
    <p>SDN Butoh I Ngasem</p>
</header>

<div class="nav">
    <a href="index.html" class="back-btn">← Beranda</a>
</div>

<div class="container">

    <h2>Cari Data NISN</h2>

    <label>Nama Lengkap</label>
    <input
        type="text"
        id="nama"
        placeholder="Masukkan nama lengkap">

    <label>Tanggal Lahir</label>
    <input
        type="date"
        id="tanggal">

    <button type="button" onclick="cariData()">
        🔍 Cari NISN
    </button>

    <div id="hasil"></div>

</div>

<footer>
    Portal NISN SDN Butoh I Ngasem
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRoGQ0XuMx_gbHQi21BloWu7hkDy1vqhh2ELQJkD-qMYJD6sW3ZUxpx-wKv_hA9Du6VQ/exec";

async function cariData() {

    const nama = document.getElementById("nama").value.trim();
    const tanggal = document.getElementById("tanggal").value;
    const hasil = document.getElementById("hasil");

    if (!nama || !tanggal) {
        alert("Silakan isi nama dan tanggal lahir.");
        return;
    }

    hasil.innerHTML = "Sedang mencari...";

    try {

        const response = await fetch(
            `${SCRIPT_URL}?nama=${encodeURIComponent(nama)}&tanggal=${encodeURIComponent(tanggal)}`
        );

        const data = await response.json();

        if (!data.success) {
            hasil.innerHTML = `
                <div class="card">
                    <h3>Data Tidak Ditemukan</h3>
                    <p>Pastikan nama dan tanggal lahir sudah sesuai dengan data sekolah.</p>
                </div>
            `;
            return;
        }

        hasil.innerHTML = `
            <div class="card">
                <h3>${data.nama}</h3>

                <p><strong>NISN</strong><br>${data.nisn}</p>

                <p><strong>Status</strong><br>${data.status}</p>

                ${data.tahunLulus
                    ? `<p><strong>Tahun Lulus</strong><br>${data.tahunLulus}</p>`
                    : ""
                }
            </div>
        `;

    } catch (err) {

        console.error(err);

        hasil.innerHTML = `
            <div class="card">
                <h3>Terjadi Kesalahan</h3>
                <p>Tidak dapat mengambil data dari server.</p>
            </div>
        `;
    }
}
</script>

</body>
</html>
