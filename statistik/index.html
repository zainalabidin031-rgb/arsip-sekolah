<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Murid | SDN Butoh 1 Ngasem</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-light: #e6f2ff; /* Biru muda cerah khas navbar */
            --primary-accent: #0077ff; /* Biru icon/text */
            --primary-gradient: linear-gradient(135deg, #0088ff 0%, #00c6ff 100%);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --shadow-subtle: 0 4px 15px rgba(0, 140, 255, 0.05);
            --shadow-card: 0 10px 30px rgba(0, 136, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            padding-bottom: 50px;
        }

        /* HEADER TAMPILAN ELEGAN */
        header {
            background: #ffffff;
            padding: 25px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-subtle);
            border-bottom: 1px solid var(--primary-light);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: var(--primary-gradient);
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(0, 136, 255, 0.2);
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-accent);
            line-height: 1.2;
        }

        .header-title p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .btn-back {
            background-color: var(--primary-light);
            color: var(--primary-accent);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background-color: var(--primary-accent);
            color: white;
            transform: translateX(-3px);
        }

        /* CONTAINER UTAMA */
        .container {
            max-width: 1100px;
            margin: 35px auto;
            padding: 0 20px;
        }

        /* SECTION FILTER */
        .filter-card {
            background: white;
            border-radius: 16px;
            padding: 20px 25px;
            box-shadow: var(--shadow-subtle);
            border: 1px solid var(--primary-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        .filter-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        select {
            padding: 10px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            background-color: #fff;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 200px;
        }

        select:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(0, 119, 255, 0.1);
        }

        /* SUMMARY CARDS GRID */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow-subtle);
            border: 1px solid #fff;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-4px);
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
        }

        .card-total::before { background: var(--primary-accent); }
        .card-l::before { background: #00c6ff; }
        .card-p::before { background: #ff4081; }

        .icon-box {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .card-total .icon-box { background: #e6f2ff; color: var(--primary-accent); }
        .card-l .icon-box { background: #e0f7fa; color: #0097a7; }
        .card-p .icon-box { background: #ffe4e6; color: #e91e63; }

        .summary-info h3 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
        }

        .summary-info p {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* DATA VISUAL LAYOUT (TABEL & GRAFIK SEJAJAR) */
        .main-data-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
        }

        .data-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(0, 136, 255, 0.03);
        }

        .card-header-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ELEGAN TABEL */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        th {
            background-color: var(--primary-light);
            color: var(--primary-accent);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px;
            border-radius: 8px;
        }

        td {
            padding: 14px;
            text-align: center;
            background-color: #f8fafc;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            transition: background 0.2s;
        }

        tr:hover td {
            background-color: #f0f7ff;
            color: var(--primary-accent);
        }

        td:first-child, th:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; text-align: left; padding-left: 20px; }
        td:last-child, th:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

        tr.row-grand-total td {
            background: var(--primary-gradient);
            color: white !important;
            font-weight: 700;
            font-size: 15px;
        }

        /* GRAFIK CONTAINER */
        .chart-box {
            position: relative;
            height: 330px;
            width: 100%;
        }

        /* RESPONSIVE BREAKPOINT */
        @media (max-width: 992px) {
            .main-data-layout {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <div class="logo-icon">
                <i class="fa-solid fa-chart-simple"></i>
            </div>
            <div>
                <h1>SD NEGERI BUTOH 1 NGASEM</h1>
                <p>Statistik Murid</p>
            </div>
        </div>
        <button class="btn-back" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </button>
    </header>

    <div class="container">
        
        <div class="filter-card">
            <div class="filter-title">
                <i class="fa-solid fa-sliders style-color: var(--primary-accent)"></i>
                Filter Analisis Data
            </div>
            <div class="filter-inputs">
                <select id="filterTahun">
                    <option value="">-- Semua Tahun Ajaran --</option>
                </select>
                <select id="filterSemester">
                    <option value="">-- Semua Semester --</option>
                    <option value="Ganjil">Semester Ganjil</option>
                    <option value="Genap">Semester Genap</option>
                </select>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-card card-total">
                <div class="icon-box"><i class="fa-solid fa-users"></i></div>
                <div class="summary-info"><h3 id="popTotal">0</h3><p>Total Siswa Terpilih</p></div>
            </div>
            <div class="summary-card card-l">
                <div class="icon-box"><i class="fa-solid fa-user-graduate"></i></div>
                <div class="summary-info"><h3 id="popL">0</h3><p>Siswa Laki-Laki (L)</p></div>
            </div>
            <div class="summary-card card-p">
                <div class="icon-box"><i class="fa-solid fa-user-graduate" style="color:#e91e63"></i></div>
                <div class="summary-info"><h3 id="popP">0</h3><p>Siswa Perempuan (P)</p></div>
            </div>
        </div>

        <div class="main-data-layout">
            
            <div class="data-card">
                <div class="card-header-title">
                    <i class="fa-solid fa-table-list" style="color: var(--primary-accent)"></i>
                    Tabel Distribusi Kelas 1 - 6
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Tingkat Kelas</th>
                                <th>Laki-Laki (L)</th>
                                <th>Perempuan (P)</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="data-card">
                <div class="card-header-title">
                    <i class="fa-solid fa-chart-bar" style="color: #00c6ff"></i>
                    Grafik Batang Perbandingan
                </div>
                <div class="chart-box">
                    <canvas id="siswaChart"></canvas>
                </div>
            </div>

        </div>

    </div>

<script>
    // ==========================================
    // !!! TEMPELKAN URL WEB APP APPS SCRIPT BARU KAMU DI BAWAH !!!
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzi0Szpw1GJsxknDuM9Bh4ZcO0-aeyi_YGXAnwL7Zgdrzf99csNkRneqjjX7js3su6/exec"; 
    
    let allSiswaData = [];
    let myChart = null;

    async function fetchStatistik() {
        document.getElementById("tableBody").innerHTML = "<tr><td colspan='4' style='text-align:center; padding:30px;'>Menghubungkan ke database Google Sheets...</td></tr>";
        try {
            const response = await fetch(SCRIPT_URL);
            const json = await response.json();
            allSiswaData = json.data || [];
            
            buildTahunFilter(allSiswaData);
            calculateAndRender();
        } catch (e) {
            document.getElementById("tableBody").innerHTML = "<tr><td colspan='4' style='text-align:center; color:red; padding:30px;'>Gagal memuat data. Periksa kembali URL Web App Apps Script Anda.</td></tr>";
        }
    }

    function buildTahunFilter(data) {
        const select = document.getElementById("filterTahun");
        const daftarTahun = [...new Set(data.map(r => r["Tahun Ajaran"] || r["TAHUN AJARAN"] || r["TA"]).filter(t => t))].sort();
        
        select.innerHTML = '<option value="">-- Semua Tahun Ajaran --</option>';
        daftarTahun.forEach(t => { select.innerHTML += `<option value="${t}">${t}</option>`; });
    }

    function calculateAndRender() {
        const taPilihan = document.getElementById("filterTahun").value;
        const semPilihan = document.getElementById("filterSemester").value.toLowerCase();
        
        const filteredData = allSiswaData.filter(s => {
            const sTA = String(s["Tahun Ajaran"] || s["TAHUN AJARAN"] || s["TA"] || "");
            const sSem = String(s["Semester"] || s["SEMESTER"] || "").toLowerCase();
            
            const matchTA = taPilihan === "" || sTA === taPilihan;
            const matchSem = semPilihan === "" || sSem === semPilihan;
            return matchTA && matchSem;
        });

        let stats = {
            1: { L: 0, P: 0 }, 2: { L: 0, P: 0 }, 3: { L: 0, P: 0 },
            4: { L: 0, P: 0 }, 5: { L: 0, P: 0 }, 6: { L: 0, P: 0 }
        };
        
        let grandTotalL = 0;
        let grandTotalP = 0;

        filteredData.forEach(s => {
            const rawKelas = String(s["Kelas"] || s["KELAS"] || "");
            const matchKelas = rawKelas.match(/[1-6]/);
            const kelasNum = matchKelas ? parseInt(matchKelas[0]) : null;
            
            let gender = String(s["L/P"] || s["GENDER"] || s["Jenis Kelamin"] || "").toUpperCase().trim();
            if(gender.startsWith("LAK")) gender = "L";
            if(gender.startsWith("PER")) gender = "P";

            if (kelasNum && stats[kelasNum]) {
                if (gender === "L") { stats[kelasNum].L++; grandTotalL++; }
                if (gender === "P") { stats[kelasNum].P++; grandTotalP++; }
            }
        });

        document.getElementById("popTotal").innerText = grandTotalL + grandTotalP;
        document.getElementById("popL").innerText = grandTotalL;
        document.getElementById("popP").innerText = grandTotalP;

        let tableHTML = "";
        let chartDataL = [];
        let chartDataP = [];

        for (let k = 1; k <= 6; k++) {
            let totalKelas = stats[k].L + stats[k].P;
            chartDataL.push(stats[k].L);
            chartDataP.push(stats[k].P);

            tableHTML += `<tr>
                <td><strong>Kelas ${k}</strong></td>
                <td>${stats[k].L} Anak</td>
                <td>${stats[k].P} Anak</td>
                <td><strong>${totalKelas} Siswa</strong></td>
            </tr>`;
        }

        tableHTML += `<tr class="row-grand-total">
            <td>TOTAL INDUK</td>
            <td>${grandTotalL} L</td>
            <td>${grandTotalP} P</td>
            <td>${grandTotalL + grandTotalP} Siswa</td>
        </tr>`;
        
        document.getElementById("tableBody").innerHTML = tableHTML;
        renderChart(chartDataL, chartDataP);
    }

    function renderChart(dataL, dataP) {
        const ctx = document.getElementById('siswaChart').getContext('2d');
        if (myChart) { myChart.destroy(); }

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Kls 1', 'Kls 2', 'Kls 3', 'Kls 4', 'Kls 5', 'Kls 6'],
                datasets: [
                    {
                        label: 'Laki-Laki',
                        data: dataL,
                        backgroundColor: '#0088ff', 
                        borderRadius: 5
                    },
                    {
                        label: 'Perempuan',
                        data: dataP,
                        backgroundColor: '#ff4081',
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { font: { family: "'Plus Jakarta Sans', sans-serif", weight: 600 } } }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    }

    document.getElementById("filterTahun").onchange = calculateAndRender;
    document.getElementById("filterSemester").onchange = calculateAndRender;

    fetchStatistik();
</script>
</body>
</html>
